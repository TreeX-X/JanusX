<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwitchX Mascot — ByteCat Pusheen Scholar Edition v4.5</title>
    <style>
        :root {
            --primary: #ff7830;
            --primary-dim: #ff783033;
            --primary-glow: rgba(255, 120, 48, 0.15);
            --bg: #09090b;
            --surface: #141417;
            --surface-raised: #1e1e24;
            --surface-code: #070709;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
            --text-bright: #ffffff;
            --border: #27272a;
            --border-accent: rgba(255, 120, 48, 0.3);
            --cyan: #06b6d4;
            --yellow: #fbbf24;
            --red: #f87171;
            --green: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 1.8rem;
            color: var(--text-bright);
            font-weight: 800;
            letter-spacing: -0.02em;
        }
        header h1 span { color: var(--primary); }
        header p {
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ── Workspace Grid ── */
        .workspace {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 24px;
            max-width: 920px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
        }

        /* ── Canvas Frame ── */
        .visualizer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--surface-code);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: relative;
        }

        .canvas-container {
            position: relative;
            background: #101012;
            border-radius: 8px;
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.6);
            padding: 12px;
            border: 1px dashed var(--border);
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* ── State Selector & Controls ── */
        .controls {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .state-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .state-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 2px;
        }

        /* Mascot Tabs Style */
        .mascot-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .tab-mascot {
            flex: 1;
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 6px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }

        .tab-mascot:hover {
            border-color: var(--primary-dim);
            color: var(--text-bright);
        }

        .tab-mascot.active {
            border-color: var(--primary);
            background: var(--primary-dim);
            color: var(--text-bright);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .btn-state {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .btn-state:hover {
            border-color: var(--primary-dim);
            background: rgba(255, 120, 48, 0.04);
            color: var(--text-bright);
        }

        .btn-state.active {
            border-color: var(--primary);
            background: var(--primary-dim);
            color: var(--text-bright);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .btn-state .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .btn-state.active .status-dot {
            background: var(--primary);
            box-shadow: 0 0 6px var(--primary);
        }

        /* State specific dot glows */
        .btn-state[data-state="reading"].active .status-dot { background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .btn-state[data-state="writing"].active .status-dot { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
        .btn-state[data-state="success"].active .status-dot { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
        .btn-state[data-state="error"].active .status-dot { background: var(--red); box-shadow: 0 0 8px var(--red); }

        /* ── Log Box ── */
        .terminal {
            background: var(--surface-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.72rem;
            height: 110px;
            overflow-y: auto;
            margin-top: 14px;
            color: #d4d4d8;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 14px;
            font-size: 0.65rem;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }

        .log-line { margin-bottom: 3px; line-height: 1.35; }
        .log-time { color: var(--text-dim); margin-right: 4px; }
        .log-tag { color: var(--primary); margin-right: 4px; }

        .options {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            font-size: 0.72rem;
            color: var(--text-dim);
        }

        .option-toggle {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .option-toggle input { accent-color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1>SwitchX Mascot — <span id="headerMascotName">ByteCat</span> v4.5</h1>
    <p>软萌胖橘学术监督官 · 并行管道联动机能版</p>
</header>

<div class="workspace">
    <!-- 左侧展示区 -->
    <div class="visualizer">
        <div class="canvas-container">
            <canvas id="petCanvas" width="320" height="320"></canvas>
        </div>
        
        <div class="options">
            <label class="option-toggle">
                <input type="checkbox" id="gridToggle" checked>
                <span>显示 32×32 像素网格</span>
            </label>
        </div>
    </div>

    <!-- 右侧控制区 -->
    <div class="controls">
        <div class="state-selector">
            <!-- 新增：智能体形象热切换卡片 -->
            <div class="state-title">智能体形象切换</div>
            <div class="mascot-tabs">
                <button class="tab-mascot active" data-type="bytecat">cc-ByteCat (胖橘)</button>
                <button class="tab-mascot" data-type="scholar">cc-Scholar (学霸)</button>
                <button class="tab-mascot" data-type="pusheen">cc-Deployer (布丁)</button>
            </div>

            <div class="state-title">Agent 任务状态联动机能</div>
            
            <button class="btn-state" data-state="idle">
                <span>🐱 IDLE (乖巧待命/暖萌呼吸)</span>
                <span class="status-dot"></span>
            </button>
            
            <button class="btn-state" data-state="reading">
                <span>👓 READING (读代码/英伦大眼镜)</span>
                <span class="status-dot"></span>
            </button>
            
            <button class="btn-state" data-state="writing">
                <span>✏️ WRITING (改代码/沙沙挥笔)</span>
                <span class="status-dot"></span>
            </button>
            
            <button class="btn-state active" data-state="success">
                <span>🎓 SUCCESS (完美通过/高举双手欢呼)</span>
                <span class="status-dot"></span>
            </button>
            
            <button class="btn-state" data-state="error">
                <span>⚠️ ERROR (编译报错/委屈抖动)</span>
                <span class="status-dot"></span>
            </button>
        </div>

        <div>
            <div class="terminal-header">
                <span style="display:flex; gap:3px;">
                    <span style="width:5px;height:5px;background:#f87171;border-radius:50%"></span>
                    <span style="width:5px;height:5px;background:#fbbf24;border-radius:50%"></span>
                    <span style="width:5px;height:5px;background:#4ade80;border-radius:50%"></span>
                </span>
                <span>bytecat-scheduler.log</span>
            </div>
            <div class="terminal" id="terminalLog">
                <div class="log-line"><span class="log-time">[12:00:00]</span><span class="log-tag">[System]</span> 庆祝动作完美优化！双大十字星闪烁，配正弦漂落五彩纸屑。</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('petCanvas');
    const ctx = canvas.getContext('2d');
    const gridToggle = document.getElementById('gridToggle');
    const terminalLog = document.getElementById('terminalLog');
    const headerMascotName = document.getElementById('headerMascotName');

    let currentMascot = 'bytecat'; // 默认启动橘猫
    let currentStatus = 'success'; // 默认切到重写后的 SUCCESS
    let tick = 0;

    // 橘猫专用高清像素调色盘 (并额外扩充 Scholar 和 Pusheen 的高级配色)
    const C = {
        _ : null,             // 透明
        B : '#4D210C',        // 深焦糖褐 (超萌软轮廓线与面部五官)
        O : '#F98B20',        // 活力暖橘 (主色)
        D : '#C45B0E',        // 焦糖暗橘 (斑纹)
        W : '#FFF2E6',        // 奶油白 (肚皮、眼镜内色、卷轴)
        K : '#2D2D30',        // 哑光深灰 (帽子、大眼鏡、瞳孔)
        Y : '#FBBF24',        // 亮金黄 (流苏、铅笔、欢庆星)
        P : '#FCA5A5',        // 蜜桃粉 (腮红、小肉垫、小舌头)
        R : '#EF4444',        // 红色 (领结、蝴蝶结、吊带)
        G : '#9CA3AF',        // 银灰色 (纸张、笔尖)
        S : '#38BDF8',        // 水蓝色 (泪水、好运天蓝星)
        T : '#E5E7EB',        // 软浅灰色 (用于 Pusheen 身体)
        H : '#9CA3AF'         // 软暗灰色 (用于 Pusheen 纹路)
    };

    const mascotDisplayNames = {
        bytecat: 'ByteCat',
        scholar: 'Scholar',
        pusheen: 'Deployer'
    };

    const stateLogs = {
        idle: "状态切换: IDLE. 吐司胖橘原地趴窝，学术帽端正戴好，尾巴软绵绵摇摆...",
        reading: "状态切换: READING. 戴上了学院风超大方圆眼镜，镜片后的大眼睛正在扫视代码。",
        writing: "状态切换: WRITING. 小肉爪抓起 2B 铅笔在草纸上唰唰修改，尾巴进入高效高频摇摆！",
        success: "编译成功: SUCCESS！小胖橘开心地高举双手(露出了粉红肉垫！)欢呼，漫天洒落着轻盈的纸屑！",
        error: "状态切换: ERROR. 报错！学术帽端正扣在头上，整只猫委屈得直打哆嗦，冷汗直流..."
    };

    // 智能体形象切换 Tab 控制
    document.querySelectorAll('.tab-mascot').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab-mascot').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentMascot = tab.getAttribute('data-type');
            headerMascotName.textContent = mascotDisplayNames[currentMascot];
            addLog(`形象切换为: ${mascotDisplayNames[currentMascot]} 智能体。`);
        });
    });

    // 状态机切换控制
    document.querySelectorAll('.btn-state').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.btn-state').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            currentStatus = button.getAttribute('data-state');
            addLog(stateLogs[currentStatus]);
        });
    });

    function addLog(text) {
        const time = new Date().toTimeString().split(' ')[0];
        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = `<span class="log-time">[${time}]</span><span class="log-tag">[Daemon]</span> ${text}`;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    // 统一绘图引擎
    function drawMascot() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 创建 32x32 空网格
        const grid = Array(32).fill(null).map(() => Array(32).fill(null));

        // 1. 物理位移计算 (慢速呼吸)
        let breathY = 0;
        if (currentStatus === 'idle' || currentStatus === 'reading' || currentStatus === 'success') {
            breathY = Math.floor(tick / 20) % 2 === 0 ? 1 : 0;
        }
        const hy = (y) => y + breathY;

        let shakeX = 0;
        if (currentStatus === 'error') {
            shakeX = (Math.floor(tick / 2) % 2 === 0) ? 0 : -1;
        }

        // 像素点落入网格
        const drawPixel = (x, y, color) => {
            let rx = x + shakeX;
            let ry = y;
            if (rx >= 0 && rx < 32 && ry >= 0 && ry < 32) {
                grid[ry][rx] = color;
            }
        };

        // 颜色调色盘拦截与重新着色映射
        const getColor = (char) => {
            if (!char) return null;
            if (currentMascot === 'scholar') {
                if (char === 'O') return C.G;      // 身体主色 -> 灰色
                if (char === 'D') return C.B;      // 斑纹斑点 -> 焦糖褐
                if (char === 'W') return '#E0F2FE'; // 大肚皮 -> 浅灰蓝
            }
            if (currentMascot === 'pusheen') {
                if (char === 'O') return C.T;      // 身体主色 -> 布丁白灰
                if (char === 'D') return C.H;      // 斑纹斑点 -> 煤灰
                if (char === 'W') return '#FFFFFF'; // 大肚皮 -> 纯白
            }
            return C[char]; // 默认 ByteCat
        };

        // 2. 尾巴绘制与摆动
        let tailSwing = Math.floor(tick / 8) % 3;
        if (currentStatus === 'error') {
            drawPixel(25, 21, 'B'); drawPixel(26, 21, 'B');
            drawPixel(25, 22, 'O'); drawPixel(26, 22, 'O'); drawPixel(27, 22, 'B');
            drawPixel(26, 23, 'B');
        } else {
            if (tailSwing === 0) {
                drawPixel(25, 20, 'B'); drawPixel(26, 19, 'B'); drawPixel(27, 18, 'B');
                drawPixel(26, 20, 'O'); drawPixel(27, 19, 'O'); drawPixel(28, 18, 'B');
                drawPixel(26, 21, 'D'); drawPixel(27, 20, 'O'); drawPixel(27, 21, 'B');
            } else if (tailSwing === 1) {
                drawPixel(25, 20, 'B'); drawPixel(26, 20, 'B'); drawPixel(27, 20, 'B');
                drawPixel(26, 21, 'O'); drawPixel(27, 21, 'O'); drawPixel(28, 21, 'B');
                drawPixel(27, 22, 'B');
            } else {
                drawPixel(25, 20, 'B'); drawPixel(26, 21, 'B'); drawPixel(27, 22, 'B');
                drawPixel(26, 20, 'O'); drawPixel(27, 21, 'O'); drawPixel(28, 22, 'B');
                drawPixel(27, 23, 'B');
            }
        }

        // 3. 橘猫基础躯干绘制
        for (let y = 13; y <= 23; y++) {
            for (let x = 7; x <= 24; x++) {
                drawPixel(x, hy(y), 'O');
            }
        }

        // 奶油白大肚皮
        for (let y = 19; y <= 23; y++) {
            for (let x = 11; x <= 20; x++) {
                drawPixel(x, hy(y), 'W');
            }
        }

        // 暗橘色斑纹
        for (let y = 14; y <= 17; y++) {
            drawPixel(22, hy(y), 'D'); drawPixel(23, hy(y), 'D');
        }
        for (let y = 18; y <= 20; y++) {
            drawPixel(23, hy(y), 'D'); drawPixel(24, hy(y), 'D');
        }

        // 描边轮廓线
        for (let x = 9; x <= 22; x++) drawPixel(x, hy(12), 'B');
        for (let x = 8; x <= 23; x++) drawPixel(x, hy(24), 'B');
        for (let y = 14; y <= 22; y++) {
            drawPixel(6, hy(y), 'B');  
            drawPixel(25, hy(y), 'B'); 
        }
        drawPixel(7, hy(13), 'B'); drawPixel(8, hy(13), 'O');
        drawPixel(24, hy(13), 'B'); drawPixel(23, hy(13), 'O');
        drawPixel(7, hy(23), 'B');
        drawPixel(24, hy(23), 'B');

        // 4. 小猫耳
        drawPixel(7, hy(10), 'B'); drawPixel(8, hy(10), 'B');
        drawPixel(6, hy(11), 'B'); drawPixel(7, hy(11), 'P'); drawPixel(8, hy(11), 'P'); drawPixel(9, hy(11), 'B');
        drawPixel(6, hy(12), 'B'); drawPixel(9, hy(12), 'B');

        drawPixel(22, hy(10), 'B'); drawPixel(23, hy(10), 'B');
        drawPixel(21, hy(11), 'B'); drawPixel(22, hy(11), 'P'); drawPixel(23, hy(11), 'P'); drawPixel(24, hy(11), 'B');
        drawPixel(21, hy(12), 'B'); drawPixel(24, hy(12), 'B');

        // 5. 四肢
        drawPixel(8, hy(24), 'B'); drawPixel(8, hy(25), 'B'); drawPixel(9, hy(25), 'B');
        drawPixel(12, hy(24), 'B'); drawPixel(12, hy(25), 'B'); drawPixel(13, hy(25), 'B');
        drawPixel(18, hy(24), 'B'); drawPixel(18, hy(25), 'B'); drawPixel(19, hy(25), 'B');
        drawPixel(22, hy(24), 'B'); drawPixel(22, hy(25), 'B'); drawPixel(23, hy(25), 'B');

        // 6. 学术帽与流苏系统
        for (let x = 6; x <= 24; x++) drawPixel(x, hy(6), 'K');
        for (let x = 5; x <= 25; x++) drawPixel(x, hy(7), 'K');

        for (let y = 8; y <= 11; y++) {
            for (let x = 11; x <= 19; x++) drawPixel(x, hy(y), 'K');
        }

        drawPixel(14, hy(6), 'Y'); drawPixel(15, hy(6), 'Y'); drawPixel(16, hy(6), 'Y');
        for (let x = 16; x <= 22; x++) drawPixel(x, hy(5), 'Y');
        
        let tasselFreq = currentStatus === 'success' ? 0.3 : 0.15;
        let tasselOsc = Math.sin(tick * tasselFreq) > 0 ? 1 : 0;
        drawPixel(22 + tasselOsc, hy(6), 'Y');
        drawPixel(22 + tasselOsc, hy(7), 'Y');
        drawPixel(22 + tasselOsc, hy(8), 'Y');
        drawPixel(22 + tasselOsc, hy(9), 'Y');

        // 非成功状态下正常面部腮红描绘
        if (currentStatus !== 'success') {
            for (let x = 7; x <= 8; x++) drawPixel(x, hy(17), 'P');
            for (let x = 22; x <= 23; x++) drawPixel(x, hy(17), 'P');
        }

        // 7. 任务执行状态机绘图分支
        if (currentStatus === 'idle') {
            drawPixel(10, hy(15), 'K'); drawPixel(11, hy(15), 'K');
            drawPixel(10, hy(16), 'K'); drawPixel(11, hy(16), 'K');

            drawPixel(19, hy(15), 'K'); drawPixel(20, hy(15), 'K');
            drawPixel(19, hy(16), 'K'); drawPixel(20, hy(16), 'K');

            drawPixel(15, hy(17), 'B');
        }
        else if (currentStatus === 'reading') {
            // 方框学术黑眼镜
            for (let x = 8; x <= 13; x++) { drawPixel(x, hy(13), 'K'); drawPixel(x, hy(18), 'K'); }
            for (let y = 14; y <= 17; y++) { drawPixel(8, hy(y), 'K'); drawPixel(13, hy(y), 'K'); }
            for (let x = 17; x <= 22; x++) { drawPixel(x, hy(13), 'K'); drawPixel(x, hy(18), 'K'); }
            for (let y = 14; y <= 17; y++) { drawPixel(17, hy(y), 'K'); drawPixel(22, hy(y), 'K'); }
            drawPixel(14, hy(15), 'K'); drawPixel(15, hy(15), 'K'); drawPixel(16, hy(15), 'K');

            let scanLeft = Math.floor(tick / 15) % 2 === 0;
            if (scanLeft) {
                drawPixel(9, hy(15), 'K'); drawPixel(18, hy(15), 'K');
                drawPixel(9, hy(16), 'K'); drawPixel(18, hy(16), 'K');
            } else {
                drawPixel(12, hy(15), 'K'); drawPixel(21, hy(15), 'K');
                drawPixel(12, hy(16), 'K'); drawPixel(21, hy(16), 'K');
            }
            drawPixel(15, hy(17), 'B');
        }
        else if (currentStatus === 'writing') {
            drawPixel(10, hy(15), 'B'); drawPixel(11, hy(15), 'B');
            drawPixel(19, hy(15), 'B'); drawPixel(20, hy(15), 'B');
            drawPixel(15, hy(17), 'B');

            // 代码本子
            for (let y = 23; y <= 28; y++) {
                for (let x = 2; x <= 7; x++) drawPixel(x, y, 'W');
            }
            for (let x = 2; x <= 7; x++) { drawPixel(x, 22, 'B'); drawPixel(x, 29, 'B'); }
            for (let y = 23; y <= 28; y++) { drawPixel(1, y, 'B'); drawPixel(8, y, 'B'); }
            drawPixel(3, 24, 'G'); drawPixel(4, 24, 'G');
            drawPixel(3, 26, 'G'); drawPixel(5, 26, 'G');

            // 笔晃动特效
            let penOsc = Math.floor(tick / 4) % 2;
            let px = 6 + penOsc;
            let py = 19;
            drawPixel(px, py, 'Y'); drawPixel(px+1, py, 'Y');
            drawPixel(px-1, py+1, 'G');
            drawPixel(px+2, py-1, 'R');
            drawPixel(px, py+1, 'O');
        }
        else if (currentStatus === 'success') {
            // 笑眯眼 ><
            drawPixel(10, hy(14), 'B');
            drawPixel(11, hy(15), 'B');
            drawPixel(10, hy(16), 'B');
            
            drawPixel(19, hy(14), 'B');
            drawPixel(18, hy(15), 'B');
            drawPixel(19, hy(16), 'B');

            // 欢呼开心红晕与微笑张嘴
            drawPixel(8, hy(15), 'P'); drawPixel(9, hy(15), 'P');
            drawPixel(8, hy(16), 'P'); drawPixel(9, hy(16), 'P');
            
            drawPixel(20, hy(15), 'P'); drawPixel(21, hy(15), 'P');
            drawPixel(20, hy(16), 'P'); drawPixel(21, hy(16), 'P');

            drawPixel(14, hy(16), 'B');
            drawPixel(16, hy(16), 'B');
            drawPixel(14, hy(17), 'B');
            drawPixel(15, hy(17), 'P'); // 小舌头
            drawPixel(16, hy(17), 'B');
            drawPixel(15, hy(18), 'B');

            // 高举双手 "Hooray" 姿态，带极萌粉红小肉垫 (P)
            drawPixel(5, hy(12), 'B'); drawPixel(6, hy(12), 'B');
            drawPixel(4, hy(13), 'B'); drawPixel(5, hy(13), 'O'); drawPixel(6, hy(13), 'O');
            drawPixel(4, hy(14), 'B'); drawPixel(5, hy(14), 'P'); drawPixel(6, hy(14), 'O');
            drawPixel(5, hy(15), 'B'); drawPixel(6, hy(15), 'B');

            drawPixel(26, hy(12), 'B'); drawPixel(25, hy(12), 'B');
            drawPixel(27, hy(13), 'B'); drawPixel(26, hy(13), 'O'); drawPixel(25, hy(13), 'O');
            drawPixel(27, hy(14), 'B'); drawPixel(26, hy(14), 'P'); drawPixel(25, hy(14), 'O');
            drawPixel(26, hy(15), 'B'); drawPixel(25, hy(15), 'B');

            // 大金星闪烁 (左上 & 右上)
            let starPulse = Math.floor(tick / 5) % 2 === 0;
            if (starPulse) {
                drawPixel(3, 3, 'Y'); 
                drawPixel(2, 4, 'Y'); drawPixel(3, 4, 'Y'); drawPixel(4, 4, 'Y'); 
                drawPixel(3, 5, 'Y');
                
                drawPixel(28, 3, 'Y'); 
                drawPixel(27, 4, 'Y'); drawPixel(28, 4, 'Y'); drawPixel(29, 4, 'Y'); 
                drawPixel(28, 5, 'Y');
            }

            // 动态正弦波漂落五彩斑斓纸屑
            const confettiColors = ['Y', 'S', 'P', 'R', 'Y', 'S'];
            const confettiBases = [
                { bx: 3,  by: 0,  speed: 0.4, drift: 1.5, phase: 0 },
                { bx: 28, by: 5,  speed: 0.35, drift: 1.2, phase: 2 },
                { bx: 5,  by: 12, speed: 0.45, drift: 2.0, phase: 1 },
                { bx: 27, by: 15, speed: 0.3, drift: 1.0, phase: 3 },
                { bx: 12, by: 1,  speed: 0.5, drift: 0.8, phase: 4 },
                { bx: 20, by: 2,  speed: 0.4, drift: 1.1, phase: 5 }
            ];
            confettiBases.forEach((p, idx) => {
                let y = Math.floor(p.by + tick * p.speed) % 30;
                let x = Math.floor(p.bx + Math.sin(tick * 0.1 + p.phase) * p.drift);
                if (x >= 1 && x < 31 && y >= 1 && y < 31) {
                    if (x < 7 || x > 24 || y < 11) {
                        drawPixel(x, y, confettiColors[idx % confettiColors.length]);
                    }
                }
            });
        }
        else if (currentStatus === 'error') {
            drawPixel(10, hy(15), 'B'); drawPixel(11, hy(15), 'B');
            drawPixel(10, hy(16), 'B'); drawPixel(11, hy(16), 'B');
            drawPixel(10, hy(17), 'B'); drawPixel(11, hy(17), 'B');

            drawPixel(19, hy(15), 'B'); drawPixel(20, hy(15), 'B');
            drawPixel(19, hy(16), 'B'); drawPixel(20, hy(16), 'B');
            drawPixel(19, hy(17), 'B'); drawPixel(20, hy(17), 'B');

            drawPixel(14, hy(19), 'B'); drawPixel(15, hy(19), 'B'); drawPixel(16, hy(19), 'B');

            // 蓝色冷汗泪水滑落
            let drop = Math.floor(tick / 3) % 8;
            if (drop < 7) {
                drawPixel(9, hy(17 + drop), 'S');
                drawPixel(21, hy(17 + drop), 'S');
            }
        }

        // 8. 绘制 32x32 物理投影像素
        const cellSize = canvas.width / 32;

        if (gridToggle.checked) {
            ctx.strokeStyle = '#1d1d22';
            ctx.lineWidth = 1;
            for (let i = 0; i <= 32; i++) {
                ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(canvas.width, i * cellSize); ctx.stroke();
            }
        }

        for (let y = 0; y < 32; y++) {
            for (let x = 0; x < 32; x++) {
                const colorKey = grid[y][x];
                const realColor = getColor(colorKey);
                if (realColor) {
                    ctx.fillStyle = realColor;
                    ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                }
            }
        }
    }

    function animationLoop() {
        tick++;
        drawMascot();
        requestAnimationFrame(animationLoop);
    }

    animationLoop();
</script>

</body>
</html>
