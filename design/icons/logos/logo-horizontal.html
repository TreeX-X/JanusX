<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Logo - 极简横版</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
    }
    svg { max-width: 600px; }
  </style>
</head>
<body>
  <svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
    <!-- X 第一笔 - 黑色 -->
    <path d="M 20 30 L 70 80"
          stroke="#ffffff"
          stroke-width="12"
          stroke-linecap="round"
          fill="none"/>

    <!-- X 第二笔 - 橙色 -->
    <path d="M 70 30 L 20 80"
          stroke="#ff7830"
          stroke-width="12"
          stroke-linecap="round"
          fill="none"/>

    <!-- 文字 SwitchX -->
    <text x="100" y="75"
          font-family="-apple-system, BlinkMacSystemFont, sans-serif"
          font-size="48"
          font-weight="600"
          fill="#d4d4d4"
          letter-spacing="2">Switch<tspan fill="#ff7830">X</tspan></text>
  </svg>
</body>
</html>
