<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Logo - 极简纯X</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
    }
    svg { max-width: 300px; }
  </style>
</head>
<body>
  <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <!-- X 第一笔 - 黑色 -->
    <path d="M 20 20 L 100 100"
          stroke="#ffffff"
          stroke-width="16"
          stroke-linecap="round"
          fill="none"/>

    <!-- X 第二笔 - 橙色渐变 -->
    <defs>
      <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#ff8844;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#ff7830;stop-opacity:1" />
      </linearGradient>
    </defs>
    <path d="M 100 20 L 20 100"
          stroke="url(#xGrad)"
          stroke-width="16"
          stroke-linecap="round"
          fill="none"/>
  </svg>
</body>
</html>
