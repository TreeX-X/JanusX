<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Logo - 方形</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
    }
    svg { max-width: 400px; }
  </style>
</head>
<body>
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- 圆角方形背景 -->
    <rect x="0" y="0" width="200" height="200" rx="32" fill="#0a0a0a"/>

    <!-- X 第一笔 - 黑色 -->
    <path d="M 50 50 L 150 150"
          stroke="#ffffff"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"/>

    <!-- X 第二笔 - 橙色 -->
    <path d="M 150 50 L 50 150"
          stroke="#ff7830"
          stroke-width="18"
          stroke-linecap="round"
          fill="none"/>

    <!-- 边框 -->
    <rect x="4" y="4" width="192" height="192" rx="30"
          fill="none"
          stroke="#ff7830"
          stroke-width="1.5"
          opacity="0.25"/>
  </svg>
</body>
</html>
