<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Favicon - 32x32</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      gap: 40px;
    }
    svg {
      width: 128px;
      height: 128px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- 深色背景 Favicon -->
    <rect x="0" y="0" width="32" height="32" fill="#0a0a0a"/>
    <path d="M 8 8 L 24 24" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M 24 8 L 8 24" stroke="#ff7830" stroke-width="4" stroke-linecap="round" fill="none"/>
  </svg>

  <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- 透明背景 Favicon -->
    <path d="M 8 8 L 24 24" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M 24 8 L 8 24" stroke="#ff7830" stroke-width="4" stroke-linecap="round" fill="none"/>
  </svg>

  <div style="position: fixed; bottom: 20px; color: #666; font-family: monospace; font-size: 12px;">
    32×32 Favicon | 左：深色背景 | 右：透明背景
  </div>
</body>
</html>
