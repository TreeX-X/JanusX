<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Badge - 激活态</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #000;
      gap: 30px;
    }
    svg { max-width: 200px; }
  </style>
</head>
<body>
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 小圆形徽章 - 激活态 -->
    <circle cx="50" cy="50" r="50" fill="#ff7830"/>
    <path d="M 30 30 L 70 70"
          stroke="#0a0a0a"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
    <path d="M 70 30 L 30 70"
          stroke="#fff"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
  </svg>

  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 小圆形徽章 - 未激活 -->
    <circle cx="50" cy="50" r="50" fill="#1a1a1a"/>
    <path d="M 30 30 L 70 70"
          stroke="#0a0a0a"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
    <path d="M 70 30 L 30 70"
          stroke="#444"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
  </svg>

  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- 方形徽章 - 激活态 -->
    <rect x="0" y="0" width="100" height="100" rx="16" fill="#ff7830"/>
    <path d="M 25 25 L 75 75"
          stroke="#0a0a0a"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
    <path d="M 75 25 L 25 75"
          stroke="#fff"
          stroke-width="8"
          stroke-linecap="round"
          fill="none"/>
  </svg>
</body>
</html>
