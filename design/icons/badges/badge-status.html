<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwitchX Badge - 状态指示器</title>
  <style>
    body {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      gap: 40px;
      padding: 40px;
    }
    .badge-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .label {
      font-family: -apple-system, sans-serif;
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    svg { max-width: 80px; }
  </style>
</head>
<body>
  <div class="badge-group">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- 连接中 -->
      <circle cx="40" cy="40" r="40" fill="#ff7830" opacity="0.15"/>
      <circle cx="40" cy="40" r="32" fill="none" stroke="#ff7830" stroke-width="2"/>
      <path d="M 28 28 L 52 52"
            stroke="#1a1a1a"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
      <path d="M 52 28 L 28 52"
            stroke="#ff7830"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
      <circle cx="40" cy="40" r="40" fill="none" stroke="#ff7830" stroke-width="1" opacity="0.3">
        <animate attributeName="r" from="40" to="44" dur="1.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" from="0.3" to="0" dur="1.5s" repeatCount="indefinite"/>
      </circle>
    </svg>
    <span class="label">连接中</span>
  </div>

  <div class="badge-group">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- 已连接 -->
      <circle cx="40" cy="40" r="40" fill="#ff7830"/>
      <path d="M 26 26 L 54 54"
            stroke="#0a0a0a"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
      <path d="M 54 26 L 26 54"
            stroke="#fff"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
    </svg>
    <span class="label">已连接</span>
  </div>

  <div class="badge-group">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- 错误 -->
      <circle cx="40" cy="40" r="40" fill="#ff5555"/>
      <path d="M 28 28 L 52 52"
            stroke="#1a1a1a"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
      <path d="M 52 28 L 28 52"
            stroke="#fff"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
    </svg>
    <span class="label">错误</span>
  </div>

  <div class="badge-group">
    <svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <!-- 断开 -->
      <circle cx="40" cy="40" r="40" fill="#2a2a2a"/>
      <path d="M 28 28 L 52 52"
            stroke="#0a0a0a"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
      <path d="M 52 28 L 28 52"
            stroke="#555"
            stroke-width="6"
            stroke-linecap="round"
            fill="none"/>
    </svg>
    <span class="label">断开</span>
  </div>
</body>
</html>
