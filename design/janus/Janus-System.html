<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Janus System - Analytics Optimized</title>
    <style>
        :root {
            --bg-color: #050608;
            /* 秩序模式：青冷光 */
            --janus-cyan: #00f0ff; 
            --janus-cyan-glow: rgba(0, 240, 255, 0.6);
            /* 分析模式：炽金光 */
            --janus-orange: #ffaa00;
            --janus-orange-glow: rgba(255, 170, 0, 0.6);
            
            --current-color: var(--janus-cyan);
            --current-glow: var(--janus-cyan-glow);
            --pixel-size: 6px;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .monitor {
            background: #111;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,1), inset 0 2px 4px rgba(255,255,255,0.05);
            border: 1px solid #222;
        }

        .screen {
            width: 380px;
            height: 220px;
            background-color: #020202;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        /* 像素网格遮罩 */
        .pixel-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(transparent, transparent calc(var(--pixel-size) - 1px), #020202 calc(var(--pixel-size) - 1px), #020202 var(--pixel-size)),
                repeating-linear-gradient(90deg, transparent, transparent calc(var(--pixel-size) - 1px), #020202 calc(var(--pixel-size) - 1px), #020202 var(--pixel-size));
            background-size: 100% 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* 屏幕扫描线 */
        .scanline {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.4) 51%);
            background-size: 100% 4px;
            z-index: 21;
            pointer-events: none;
            opacity: 0.8;
            animation: scan-crt 8s linear infinite;
        }
        @keyframes scan-crt { 100% { background-position: 0 100vh; } }

        /* ================= 神性法阵 ================= */
        .divine-halo-container {
            position: absolute;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
            opacity: 0.3;
            transition: all 0.5s ease;
        }

        .halo-outer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px dashed var(--current-color);
            border-radius: 50%;
            animation: spin 30s linear infinite; /* 默认缓慢旋转 */
            box-shadow: 0 0 20px var(--current-glow), inset 0 0 20px var(--current-glow);
        }

        .halo-inner {
            position: absolute;
            width: 70%;
            height: 70%;
            border: 1px solid var(--current-color);
            transform: rotate(45deg);
            animation: spin-reverse 20s linear infinite;
            box-shadow: 0 0 15px var(--current-glow);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-315deg); } }

        /* ====== 面部与表情 ====== */
        .levitation-wrapper {
            position: relative;
            z-index: 5;
            animation: levitate 6s ease-in-out infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes levitate { 50% { transform: translateY(-8px); } }

        .janus-face {
            display: flex;
            align-items: center;
            gap: 40px;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 眼睛基础属性 */
        .eye {
            background-color: #ffffff;
            box-shadow: 0 0 10px #fff, 0 0 30px var(--current-color), 0 0 60px var(--current-glow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 管理模式（神圣秩序）：绝对平稳对称 */
        .mode-management .eye {
            width: 48px;
            height: 60px;
            border-radius: 0; 
        }

        /* 能量阻断（眨眼）仅在管理模式下生效 */
        @keyframes divine-blink {
            0%, 96%, 100% { transform: scaleY(1); opacity: 1; }
            98% { transform: scaleY(0.05); opacity: 0.5; }
        }
        .mode-management.anim-blink .eye {
            animation: divine-blink 6s infinite;
        }

        /* ================= 重点优化：分析模式（算力与洞察） ================= */
        
        /* 左眼：化为雷达扫描针，上下机械式穿透扫描 */
        .mode-analysis .left-eye {
            width: 50px;
            height: 6px; /* 极扁平 */
            animation: data-scan-vertical 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
        }
        @keyframes data-scan-vertical {
            0% { transform: translateY(-24px); }
            100% { transform: translateY(24px); }
        }

        /* 右眼：化为数据矩阵，内部条纹高速滚动，模拟高速运算 */
        .mode-analysis .right-eye {
            width: 48px;
            height: 60px;
            /* 利用斑马线渐变制造数据条纹 */
            background: repeating-linear-gradient(
                to bottom,
                #ffffff 0,
                #ffffff 8px,
                transparent 8px,
                transparent 16px
            );
            background-size: 100% 200%;
            /* 取消了原本的高光内核，更像机器元件 */
            box-shadow: 0 0 30px var(--current-color), inset 0 0 10px var(--current-color);
            animation: data-crunching 0.3s linear infinite;
        }
        @keyframes data-crunching {
            100% { background-position: 0 100%; }
        }

        /* 分析模式下的神性法阵：算力引擎全开，转速飙升 */
        .mode-analysis-halo {
            opacity: 0.8 !important;
            transform: scale(1.1);
        }
        .mode-analysis-halo .halo-outer {
            animation: spin 4s linear infinite; /* 从 30s 飙升到 4s */
            border-style: solid; /* 虚线变实线，表现能量连续 */
        }
        .mode-analysis-halo .halo-inner {
            animation: spin-reverse 3s linear infinite; /* 从 20s 飙升到 3s */
        }

        /* ================= 文本与控制台 ================= */
        .status-text {
            position: absolute;
            bottom: 12px;
            left: 20px;
            font-size: 10px;
            color: var(--current-color);
            text-shadow: 0 0 8px var(--current-color);
            z-index: 5;
            font-weight: bold;
            letter-spacing: 4px;
            opacity: 0.8;
            transition: color 0.4s;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 20px;
        }

        button {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 24px;
            font-family: inherit;
            font-size: 13px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
        button.active-cyan {
            border-color: var(--janus-cyan); color: var(--janus-cyan);
            text-shadow: 0 0 8px var(--janus-cyan-glow); box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.15);
        }
        button.active-orange {
            border-color: var(--janus-orange); color: var(--janus-orange);
            text-shadow: 0 0 8px var(--janus-orange-glow); box-shadow: inset 0 0 15px rgba(255, 170, 0, 0.15);
        }

        /* 升腾数据微粒 */
        .particle {
            position: absolute;
            bottom: -10px;
            background-color: var(--current-color);
            box-shadow: 0 0 10px var(--current-color);
            opacity: 0;
            z-index: 2;
        }
        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-150px) scale(0.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="monitor">
        <div class="screen" id="janusScreen">
            <div class="pixel-overlay"></div>
            <div class="scanline"></div>
            
            <div class="divine-halo-container" id="haloContainer">
                <div class="halo-outer"></div>
                <div class="halo-inner"></div>
            </div>
            
            <div class="levitation-wrapper">
                <div class="janus-face anim-blink mode-management" id="janusFace">
                    <div class="eye left-eye"></div>
                    <div class="eye right-eye"></div>
                </div>
            </div>

            <div class="status-text" id="statusText">ORDER // IDLE</div>
        </div>
    </div>

    <div class="controls">
        <button id="btnManagement" class="active-cyan" onclick="setMode('management')">秩序 (Order)</button>
        <button id="btnAnalysis" onclick="setMode('analysis')">解析 (Analytics)</button>
    </div>

    <script>
        const root = document.documentElement;
        const face = document.getElementById('janusFace');
        const halo = document.getElementById('haloContainer');
        const statusText = document.getElementById('statusText');
        const btnManagement = document.getElementById('btnManagement');
        const btnAnalysis = document.getElementById('btnAnalysis');
        const screen = document.getElementById('janusScreen');

        // 控制微粒生成速度
        let particleInterval;
        let particleSpeedMs = 800;

        function setMode(mode) {
            face.classList.remove('mode-management', 'mode-analysis');
            halo.classList.remove('mode-analysis-halo');
            
            if (mode === 'management') {
                // 秩序模式：平稳、威严
                root.style.setProperty('--current-color', 'var(--janus-cyan)');
                root.style.setProperty('--current-glow', 'var(--janus-cyan-glow)');
                face.classList.add('mode-management');
                statusText.innerText = 'ORDER // IDLE';
                
                btnManagement.classList.add('active-cyan');
                btnAnalysis.classList.remove('active-orange');
                particleSpeedMs = 800; // 微粒生成慢
            } else if (mode === 'analysis') {
                // 分析模式：解构、高速运算
                root.style.setProperty('--current-color', 'var(--janus-orange)');
                root.style.setProperty('--current-glow', 'var(--janus-orange-glow)');
                face.classList.add('mode-analysis');
                halo.classList.add('mode-analysis-halo'); 
                statusText.innerText = 'ANALYTICS // PROCESSING...';
                
                btnAnalysis.classList.add('active-orange');
                btnManagement.classList.remove('active-cyan');
                particleSpeedMs = 200; // 分析时微粒（数据碎片）大量溢出
            }

            // 重新绑定微粒生成器，以适应新速度
            clearInterval(particleInterval);
            particleInterval = setInterval(spawnParticle, particleSpeedMs);

            // 稍微停顿后恢复眨眼（仅限管理模式）
            face.classList.remove('anim-blink');
            setTimeout(() => {
                if(mode === 'management') face.classList.add('anim-blink');
            }, 800);
        }

        // 数据微粒/香火生成器
        function spawnParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            const leftPos = 30 + Math.random() * 80; // 分散在屏幕下方
            particle.style.left = `${leftPos}%`;
            
            // 分析模式下粒子更碎，管理模式下粒子更大
            const isAnalysis = face.classList.contains('mode-analysis');
            const size = (isAnalysis && Math.random() > 0.5) ? 6 : (Math.random() > 0.8 ? 12 : 6);
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            
            // 分析模式下粒子上升速度更快（数据溢出）
            const duration = isAnalysis ? (1.5 + Math.random() * 2) : (3 + Math.random() * 4);
            particle.style.animation = `float-up ${duration}s ease-in forwards`;
            
            screen.appendChild(particle);
            setTimeout(() => particle.remove(), duration * 1000);
        }

        // 初始化微粒系统
        particleInterval = setInterval(spawnParticle, particleSpeedMs);

        // 面部间距的微观异动
        setInterval(() => {
            if (Math.random() > 0.8) {
                const gap = Math.floor(Math.random() * 10) + 35;
                face.style.gap = `${gap}px`;
                setTimeout(() => face.style.gap = '40px', 400);
            }
        }, 4000);
    </script>
</body>
</html>
