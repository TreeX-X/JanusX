<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JanusX Chat</title>
    <!-- 引入极客感十足的等宽字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #161616;
            --border-color: #262626;
            --text-primary: #e5e5e5;
            --text-muted: #666666;
            --janus-orange: #ff6b00;
            --janus-gray: #8a94a6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 终端微弱网格背景 */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(18, 18, 18, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 18, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
            pointer-events: none;
        }

        /* 主容器 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 680px;
            padding: 20px;
        }

        /* ================= LOGO 区域 (OpenCode 风格) ================= */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 40px;
            user-select: none;
        }

        /* 每一个像素字母的基类 */
        .pixel-char {
            display: grid;
            grid-template-columns: repeat(4, 8px);
            grid-template-rows: repeat(5, 8px);
            gap: 2px;
        }

        /* 像素方块 */
        .pixel-char span {
            background-color: #222222; /* 未激活的暗色像素 */
            border-radius: 1px;
        }

        .pixel-char span.active {
            background-color: #ffffff; /* 激活的亮色像素 */
        }

        /* 像素化专属灰橙 X */
        .pixel-char span.x-orange {
            background-color: var(--janus-orange);
            box-shadow: 0 0 4px rgba(255, 107, 0, 0.4); /* 橙色微光 */
        }

        .pixel-char span.x-gray {
            background-color: var(--janus-gray);
        }


        /* ================= 输入框区域 ================= */
        .search-area {
            width: 100%;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-area:hover, .search-area:focus-within {
            border-color: #3e3e3e;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        /* 左侧引导条：橙色 */
        .search-area::before {
            content: "";
            position: absolute;
            left: -1px;
            top: 12px;
            bottom: 12px;
            width: 3px;
            background-color: var(--janus-orange);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px rgba(255, 107, 0, 0.5);
        }

        /* 输入框容器 */
        .input-wrapper {
            display: flex;
            align-items: center;
            padding: 18px 20px;
            position: relative;
        }

        /* 模拟光标 */
        .cursor-prompt {
            width: 10px;
            height: 18px;
            background-color: #ffffff;
            margin-right: 12px;
            animation: blink 1s infinite;
            flex-shrink: 0;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .main-input {
            width: 100%;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            letter-spacing: -0.2px;
        }

        .main-input::placeholder {
            color: var(--text-muted);
        }

        /* ================= 极简底部状态栏 ================= */
        .status-bar {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 11px;
            background-color: rgba(0, 0, 0, 0.15);
        }

        .model-tag {
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 模型激活状态绿点，增加精致感 */
        .model-tag::before {
            content: "";
            width: 4px;
            height: 4px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 4px #10b981;
        }

        .model-name {
            color: var(--text-primary);
            font-weight: 700;
        }

        /* ================= 快捷键提示组 ================= */
        .shortcuts-group {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            width: 100%;
            margin-top: 14px;
            font-size: 11px;
            padding-right: 4px;
        }

        .shortcut-item {
            color: var(--text-muted);
        }

        .shortcut-item.highlight {
            color: var(--janus-orange);
        }

        .shortcut-item span {
            color: #999;
            font-weight: 700;
        }

        /* ================= 底部提示 (Tip) ================= */
        .bottom-tip {
            margin-top: 50px;
            font-size: 11px;
            color: #555555;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tip-dot {
            width: 6px;
            height: 6px;
            background-color: var(--janus-orange);
            border-radius: 50%;
        }

        .tip-highlight {
            color: #777777;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- LOGO 区域: 采用 OpenCode 模块化像素网格 -->
        <div class="logo-container">
            <!-- J -->
            <div class="pixel-char">
                <span></span><span></span><span class="active"></span><span class="active"></span>
                <span></span><span></span><span></span><span class="active"></span>
                <span></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span></span><span class="active"></span><span class="active"></span><span></span>
            </div>
            <!-- A -->
            <div class="pixel-char">
                <span></span><span class="active"></span><span class="active"></span><span></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span class="active"></span><span class="active"></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
            </div>
            <!-- N -->
            <div class="pixel-char">
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span class="active"></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span class="active"></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
            </div>
            <!-- U -->
            <div class="pixel-char">
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span class="active"></span>
                <span></span><span class="active"></span><span class="active"></span><span></span>
            </div>
            <!-- S -->
            <div class="pixel-char">
                <span></span><span class="active"></span><span class="active"></span><span class="active"></span>
                <span class="active"></span><span></span><span></span><span></span>
                <span></span><span class="active"></span><span class="active"></span><span></span>
                <span></span><span></span><span></span><span class="active"></span>
                <span class="active"></span><span class="active"></span><span class="active"></span><span></span>
            </div>
            
            <!-- 像素化的灰橙交织 "X" -->
            <div class="pixel-char" style="margin-left: 4px;">
                <span class="x-orange"></span><span></span><span></span><span class="x-gray"></span>
                <span></span><span class="x-orange"></span><span class="x-gray"></span><span></span>
                <span></span><span></span><span class="x-orange"></span><span></span>
                <span></span><span class="x-gray"></span><span class="x-orange"></span><span></span>
                <span class="x-gray"></span><span></span><span></span><span class="x-orange"></span>
            </div>
        </div>

        <!-- 输入框区域 (包含左侧橙色指示条和最简化状态栏) -->
        <div class="search-area">
            <div class="input-wrapper">
                <div class="cursor-prompt"></div>
                <input type="text" class="main-input" placeholder='Ask Janus or execute command... "How to initialize project?"' autofocus>
            </div>
            
            <!-- 简化后的状态栏：仅显示激活的模型名称 -->
            <div class="status-bar">
                <div class="model-tag">Model: <span class="model-name">Janus-Pro-7B</span></div>
            </div>
        </div>

        <!-- 快捷键组 -->
        <div class="shortcuts-group">
            <div class="shortcut-item highlight">JANUS.md</div>
            <div class="shortcut-item"><span>tab</span> agents</div>
            <div class="shortcut-item"><span>ctrl+p</span> commands</div>
        </div>

        <!-- 底部提示 (Tip) -->
        <div class="bottom-tip">
            <div class="tip-dot"></div>
            <span>Tip: Enter <span class="tip-highlight">/help</span> to list all active execution parameters.</span>
        </div>

    </div>

</body>
</html>
