<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JanusX · Divine System (Focus & Snap Edition)</title>
  <style>
    /* ================= 基础与系统变量 ================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --surface: rgba(18, 18, 18, 0.95);
      --border: rgba(255, 255, 255, 0.08);
      --text: #d4d4d4;
      
      /* Janus 神性色彩系统 */
      --janus-cyan: #00f0ff;
      --janus-cyan-glow: rgba(0, 240, 255, 0.6);
      --janus-orange: #ffaa00;
      --janus-orange-glow: rgba(255, 170, 0, 0.6);
      /* 运行态：耀眼的灵能绿 */
      --janus-green: #00ff88;
      --janus-green-glow: rgba(0, 255, 136, 0.6);
      
      /* 当前状态 (默认为秩序态) */
      --janus-current: var(--janus-cyan);
      --janus-current-glow: var(--janus-cyan-glow);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; padding: 12px;
      transition: --janus-current 0.4s, --janus-current-glow 0.4s;
    }

    body.is-running {
      --janus-current: var(--janus-green);
      --janus-current-glow: var(--janus-green-glow);
    }

    .window {
      height: 100%; background: var(--surface);
      backdrop-filter: blur(40px) saturate(160%); border-radius: 12px;
      overflow: hidden; box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 0.5px var(--border);
      display: flex; flex-direction: column; position: relative;
    }

    /* ── 标题栏 ── */
    .titlebar {
      height: 38px; background: rgba(12, 12, 12, 0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06); display: flex; align-items: center;
      padding: 0 14px; position: relative; z-index: 1001; -webkit-app-region: drag;
    }
    .traffic-lights { display: flex; gap: 8px; -webkit-app-region: no-drag; z-index: 10; }
    .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter 0.15s; }
    .light.red { background: #ff5f57; } .light.yellow { background: #ffbd2e; } .light.green { background: #28c840; }
    .title { position: absolute; left: 70px; font-size: 13px; font-weight: 500; color: #888; display: flex; align-items: center; gap: 6px; -webkit-app-region: no-drag; user-select: none; }
    .title-icon { width: 16px; height: 16px; position: relative; }
    .title-icon::before, .title-icon::after { content: ''; position: absolute; width: 14px; height: 1.5px; top: 50%; left: 50%; background: #fff; border-radius: 1px; transition: background 0.4s; }
    .title-icon::before { transform: translate(-50%, -50%) rotate(45deg); } 
    .title-icon::after { background: var(--janus-current); transform: translate(-50%, -50%) rotate(-45deg); }

    /* ================= 灵动岛 (极简物理形态) ================= */
    .island-anchor { 
      position: absolute; left: 50%; top: 5px; 
      transform: translateX(-50%); z-index: 2000; 
      -webkit-app-region: no-drag; 
      display: flex; align-items: center; justify-content: center;
    }
    .island {
      width: 52px; height: 26px; border-radius: 13px;
      background-color: #000; border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: grab; user-select: none; position: relative;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    /* 初始轻按的物理阻尼 */
    .island.pressing { transform: scale(0.96); border-color: rgba(255,255,255,0.25); }
    .island.switching { border-color: #fff !important; box-shadow: 0 0 15px rgba(255,255,255,0.4) !important; transform: scale(1.05); }

    /* 运行状态保持极简指示 (仅边框与微弱底光，无浮夸动效) */
    .island.mode-running { 
      border-color: var(--janus-green) !important; 
      background: radial-gradient(ellipse at center, rgba(0,255,136,0.15) 0%, transparent 60%);
    }

    /* 长按蓄力满后的干脆回弹 (Snap) */
    .island.trigger-snap { animation: island-snap 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes island-snap { 
      0% { transform: scale(0.9); } 
      40% { transform: scale(1.08); border-color: #fff; } 
      100% { transform: scale(1); } 
    }

    /* 极简无色物理残影涟漪 */
    .burst-ripple {
      position: absolute; top: 50%; left: 50%; width: 52px; height: 26px; transform: translate(-50%, -50%);
      border-radius: 13px; opacity: 0; pointer-events: none; z-index: 1999;
    }
    .burst-ripple::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit; 
      border: 1.5px solid rgba(255,255,255,0.6); opacity: 0;
    }
    .burst-ripple.burst::before { animation: ripple-snap 0.4s ease-out forwards; }
    @keyframes ripple-snap {
      0% { transform: scale(1); opacity: 1; border-width: 3px; }
      100% { transform: scale(2.4, 2.8); opacity: 0; border-width: 0px; }
    }

    /* ================= Janus 神性眼 (生命力待机与聚变控制) ================= */
    .janus-face-mini { display: flex; align-items: center; gap: 5px; transition: all 0.3s ease; position: relative; z-index: 10; }
    .eye-mini { background-color: #ffffff; box-shadow: 0 0 4px #fff, 0 0 8px var(--janus-current), 0 0 16px var(--janus-current-glow); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    /* 长按蓄力接管动画：剥夺原本的生命力动画，交由 JS 进行精确的空间靠拢 */
    .is-charging .eye-mini { animation: none !important; transition: none !important; }

    .mode-management .eye-mini { 
      width: 8px; height: 10px; border-radius: 0; 
      animation: mini-idle 8s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @keyframes mini-idle {
      0%, 15%, 35%, 100% { transform: translateX(0) scale(1); }
      17%, 19% { transform: translateX(0) scaleY(0.1); } 
      21% { transform: translateX(0) scale(1); }
      40%, 48% { transform: translateX(-2px) scale(0.9); } 
      55%, 65% { transform: translateX(2px) scale(0.9); }  
      70% { transform: translateX(0) scale(1); }
      85% { transform: scale(1.1); } 
      90% { transform: scale(1); }
    }

    .mode-analysis .left-eye-mini { width: 10px; height: 2px; animation: data-scan-mini 1s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
    .mode-analysis .right-eye-mini { width: 8px; height: 10px; background: repeating-linear-gradient(to bottom, #fff 0, #fff 2px, transparent 2px, transparent 4px); background-size: 100% 200%; animation: data-crunching 0.3s linear infinite; box-shadow: 0 0 10px var(--janus-current); }

    body.is-running .eye-mini {
      width: 6px !important; border-radius: 3px !important;
      background: #fff !important; background-image: none !important; 
      box-shadow: 0 0 10px #fff, 0 0 20px var(--janus-current) !important;
      transition: none !important; transform: translateY(0) !important; 
    }
    body.is-running .left-eye-mini { animation: eq-bounce 0.25s ease-in-out infinite alternate !important; }
    body.is-running .right-eye-mini { animation: eq-bounce 0.35s ease-in-out infinite alternate-reverse !important; }

    @keyframes data-scan-mini { 0% { transform: translateY(-4px); } 100% { transform: translateY(4px); } }
    @keyframes data-crunching { 100% { background-position: 0 100%; } }
    @keyframes eq-bounce { 0% { height: 4px; } 100% { height: 14px; } }

    /* ================= 展开的大型门户 ================= */
    .island-backdrop { position: fixed; inset: 0; z-index: 99999; display: none; }
    .island-backdrop.visible { display: block; }
    .island-backdrop-bg { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.6); animation: backdrop-in 0.2s ease-out; }
    
    .island-expanded {
      position: absolute; left: 50%; top: 43px; transform: translateX(-50%);
      width: 530px; height: 260px; border-radius: 20px; background: #000;
      border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 16px 50px rgba(0,0,0,0.9), 0 0 20px var(--janus-current-glow);
      padding: 14px 16px; display: flex; flex-direction: column; justify-content: space-between;
      animation: island-expand 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transition: box-shadow 0.4s;
    }

    .island-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 6px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .island-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--janus-current); display: flex; align-items: center; gap: 6px; transition: color 0.4s; }
    .island-hint { font-size: 9px; color: #555; }

    .island-crt { 
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; 
      overflow: hidden; background: radial-gradient(circle at center, #111 0%, #000 100%); 
      border-radius: 8px; margin: 10px 0; border: 1px solid #1a1a1a; box-shadow: inset 0 0 40px rgba(0,0,0,1); 
      transition: box-shadow 0.5s;
    }
    
    .warp-grid { 
      position: absolute; inset: -50%; 
      background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      transform: perspective(300px) rotateX(60deg) translateY(0);
      pointer-events: none; z-index: 10; opacity: 0.5; transition: all 0.5s;
    }
    
    body.is-running .island-crt { animation: crt-reactor-pulse 2s infinite alternate; }
    @keyframes crt-reactor-pulse {
      0% { box-shadow: inset 0 0 30px rgba(0,255,136,0.1); }
      100% { box-shadow: inset 0 0 80px rgba(0,255,136,0.35); }
    }
    
    body.is-running .warp-grid {
      background-image: linear-gradient(rgba(0,255,136,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,136,0.1) 1px, transparent 1px);
      animation: warp-flight 0.6s linear infinite; opacity: 1;
    }
    @keyframes warp-flight { 100% { transform: perspective(300px) rotateX(60deg) translateY(20px); } }

    .scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 51%); background-size: 100% 4px; pointer-events: none; z-index: 21; animation: scan-crt 8s linear infinite; }
    @keyframes scan-crt { 100% { background-position: 0 100vh; } }
    body.is-running .scanline { display: none !important; }
    .pixel-overlay { position: absolute; inset: 0; background-image: repeating-linear-gradient(transparent, transparent 3px, #020202 3px, #020202 4px), repeating-linear-gradient(90deg, transparent, transparent 3px, #020202 3px, #020202 4px); pointer-events: none; z-index: 20; opacity: 0.8; }

    .divine-halo-container { position: absolute; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; z-index: 15; opacity: 0.3; transition: all 0.5s ease; pointer-events: none;}
    .halo-outer { position: absolute; width: 100%; height: 100%; border: 2px dashed var(--janus-current); border-radius: 50%; animation: spin 20s linear infinite; box-shadow: 0 0 20px var(--janus-current-glow), inset 0 0 20px var(--janus-current-glow); transition: border-color 0.4s; }
    .halo-inner { position: absolute; width: 70%; height: 70%; border: 1px solid var(--janus-current); transform: rotate(45deg); animation: spin-reverse 15s linear infinite; box-shadow: 0 0 15px var(--janus-current-glow); transition: border-color 0.4s; }
    
    .mode-analysis-halo { opacity: 0.7 !important; transform: scale(1.1); }
    .mode-analysis-halo .halo-outer { animation: spin 4s linear infinite; border-style: solid; }
    .mode-analysis-halo .halo-inner { animation: spin-reverse 3s linear infinite; }

    body.is-running .divine-halo-container { opacity: 0.9 !important; transform: scale(1.25) !important; filter: drop-shadow(-4px 0 0px rgba(0,255,136,0.5)) drop-shadow(4px 0 0px rgba(0,180,255,0.5)); }
    body.is-running .halo-outer { animation: spin 0.8s linear infinite !important; border-style: solid !important; border-width: 3px !important; }
    body.is-running .halo-inner { animation: spin-reverse 0.6s linear infinite !important; border-color: #fff !important; border-width: 2px !important; }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes spin-reverse { 100% { transform: rotate(-315deg); } }
    
    .levitation-wrapper { position: relative; z-index: 18; animation: levitate 6s ease-in-out infinite; }
    .janus-face-lg { display: flex; align-items: center; gap: 30px; transition: all 0.4s ease; }
    .eye-lg { background-color: #ffffff; box-shadow: 0 0 10px #fff, 0 0 30px var(--janus-current), 0 0 60px var(--janus-current-glow); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    
    .mode-management .eye-lg { width: 36px; height: 48px; border-radius: 0; animation: lg-idle 10s infinite cubic-bezier(0.4, 0, 0.2, 1); }
    
    @keyframes lg-idle {
      0%, 15%, 35%, 100% { transform: translateX(0) scale(1); }
      17%, 19% { transform: translateX(0) scaleY(0.05); } 
      21% { transform: translateX(0) scale(1); }
      40%, 50% { transform: translateX(-6px) scale(0.95); } 
      55%, 65% { transform: translateX(6px) scale(0.95); }  
      70% { transform: translateX(0) scale(1); }
      85% { transform: scale(1.15); } 
      90% { transform: scale(1); }
    }

    @keyframes levitate { 50% { transform: translateY(-8px); } }

    .mode-analysis .left-eye-lg { width: 40px; height: 4px; animation: data-scan-vertical 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate; }
    .mode-analysis .right-eye-lg { width: 36px; height: 48px; background: repeating-linear-gradient(to bottom, #fff 0, #fff 6px, transparent 6px, transparent 12px); background-size: 100% 200%; box-shadow: 0 0 30px var(--janus-current), inset 0 0 10px var(--janus-current); animation: data-crunching 0.3s linear infinite; }
    @keyframes data-scan-vertical { 0% { transform: translateY(-20px); } 100% { transform: translateY(20px); } }

    body.is-running .eye-lg { width: 16px !important; border-radius: 8px !important; background: #fff !important; background-image: none !important; box-shadow: 0 0 30px #fff, 0 0 60px var(--janus-current) !important; transition: none !important; transform: translateY(0) !important; }
    body.is-running .left-eye-lg { animation: eq-bounce-lg 0.2s ease-in-out infinite alternate !important; }
    body.is-running .right-eye-lg { animation: eq-bounce-lg 0.3s ease-in-out infinite alternate-reverse !important; }
    @keyframes eq-bounce-lg { 0% { height: 16px; } 100% { height: 80px; } }

    .janus-status-text { position: absolute; bottom: 12px; left: 16px; font-size: 10px; color: var(--janus-current); text-shadow: 0 0 8px var(--janus-current); z-index: 25; font-family: 'SF Mono', monospace; font-weight: bold; letter-spacing: 3px; opacity: 0.9; transition: color 0.4s; }

    .island-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 6px; border-top: 1px solid rgba(255, 255, 255, 0.05); font-size: 10px; letter-spacing: 1px;}
    .island-footer-left { color: #555; }
    .island-footer-right { color: var(--janus-current); font-weight: bold; text-shadow: 0 0 8px var(--janus-current-glow); transition: color 0.4s; display: flex; align-items: center; gap: 6px;}
    .island-footer-right::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--janus-current); box-shadow: 0 0 4px var(--janus-current-glow); transition: background 0.4s;}
    
    @keyframes backdrop-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes island-expand { 0% { width: 52px; height: 26px; border-radius: 13px; opacity: 0; } 100% { width: 530px; height: 260px; border-radius: 20px; opacity: 1; } }

    /* ================= 主布局 Grid ================= */
    .main { flex: 1; display: grid; grid-template-areas: "sidebar terminal panel" "status status status"; grid-template-columns: 240px 1fr 280px; grid-template-rows: 1fr 26px; overflow: hidden; }

    .sidebar { grid-area: sidebar; background: rgba(26, 26, 26, 0.85); border-right: 1px solid rgba(255, 255, 255, 0.06); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header { padding: 12px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); font-size: 10px; font-weight: 600; text-transform: uppercase; color: #555; }
    .workspaces { flex: 1; padding: 6px; overflow-y: auto; }
    .ws { padding: 9px 12px; margin-bottom: 1px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #999; transition: background 0.2s; }
    .ws:hover { background: rgba(255, 255, 255, 0.03); color: #ccc; }
    .ws.active { background: rgba(255, 255, 255, 0.08); color: #fff; border-left: 2px solid var(--janus-current); }
    .ws-dot { width: 5px; height: 5px; border-radius: 50%; background: #444; transition: background 0.4s, box-shadow 0.4s; }
    .ws.active .ws-dot { background: var(--janus-current); box-shadow: 0 0 8px var(--janus-current-glow); }

    .center-wrapper { grid-area: terminal; perspective: 1500px; position: relative; background: #000; overflow: hidden; }
    .view-flipper { width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.65s cubic-bezier(0.25, 1, 0.25, 1); }
    .view-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; background: rgba(10, 10, 10, 0.95); }
    .view-terminal { transform: rotateX(0deg); }
    .view-blueprint { transform: rotateX(180deg); background: radial-gradient(circle at center, #151515 0%, #080808 100%); display:flex; align-items:center; justify-content:center; }

    .tabs { display: flex; background: rgba(6, 6, 6, 0.95); border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding: 0 10px; gap: 1px; }
    .tab { padding: 8px 14px; font-size: 12px; color: #aaa; background: rgba(12, 12, 12, 0.95); border-bottom: 1px solid var(--janus-current); border-radius: 5px 5px 0 0; margin-top: 3px; font-family: 'SF Mono', monospace; transition: border-color 0.4s; }
    .term-content { flex: 1; padding: 14px 16px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; overflow-y: auto; color:#d4d4d4;}
    .ps { color: var(--janus-current); margin-right: 8px; transition: color 0.4s; }
    .caret { display: inline-block; width: 7px; height: 15px; background: var(--janus-current); animation: blink 1.1s infinite; margin-left: 2px; transition: background 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .blueprint-msg { font-size: 16px; color: #666; letter-spacing: 2px; font-family: 'SF Mono', monospace; display:flex; flex-direction:column; align-items:center; gap:16px;}
    .blueprint-icon { width: 60px; height: 60px; border: 1px dashed var(--janus-orange); border-radius: 50%; display:flex; align-items:center; justify-content:center; animation: spin 10s linear infinite; box-shadow: 0 0 20px rgba(255,170,0,0.2);}

    .panel { grid-area: panel; background: rgba(26, 26, 26, 0.85); border-left: 1px solid rgba(255, 255, 255, 0.06); }
    .panel-header { padding: 12px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); font-size: 10px; font-weight: 600; text-transform: uppercase; color: #555; }
    .status { grid-area: status; background: rgba(8, 8, 8, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center; padding: 0 14px; font-size: 10px; color: #555; z-index: 10; }
    
    .pull-hint { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #888; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000; background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
    .pull-hint.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="traffic-lights"><div class="light red"></div><div class="light yellow"></div><div class="light green"></div></div>
      <div class="title"><div class="title-icon"></div><span>JanusX</span></div>
      
      <!-- 极简灵动岛核心 -->
      <div class="island-anchor">
        <div class="burst-ripple" id="burstRing"></div>
        <div class="island" id="janusIsland" title="双击展开 | 下拉翻转蓝图 | 长按启停">
          <!-- 核心：微型双眼 -->
          <div class="janus-face-mini mode-management" id="janusEyeMini">
            <div class="eye-mini left-eye-mini" id="eyeMiniLeft"></div>
            <div class="eye-mini right-eye-mini" id="eyeMiniRight"></div>
          </div>
        </div>
      </div>

      <!-- 双击展开的大型门户 -->
      <div class="island-backdrop" id="janusBackdrop">
        <div class="island-backdrop-bg" id="janusBackdropBg"></div>
        <div class="island-expanded" id="janusExpanded">
          <div class="island-header">
            <div class="island-title">◎ JANUS ENGINE</div>
            <div class="island-hint">双击空白处收合</div>
          </div>
          <div class="island-crt">
            <div class="warp-grid"></div>
            <div class="scanline"></div>
            <div class="pixel-overlay"></div>
            <div class="divine-halo-container" id="haloContainer">
              <div class="halo-outer"></div>
              <div class="halo-inner"></div>
            </div>
            <div class="levitation-wrapper">
              <div class="janus-face-lg mode-management" id="janusFaceLg">
                <div class="eye-lg left-eye-lg"></div>
                <div class="eye-lg right-eye-lg"></div>
              </div>
            </div>
            <div class="janus-status-text" id="janusStatus">ORDER // IDLE</div>
          </div>
          
          <div class="island-footer">
            <div class="island-footer-left">神性协议终端</div>
            <div class="island-footer-right" id="islandModeLabel">MODE: ORDER</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="pull-hint" id="pullHint">↓ 继续下拉切换视图</div>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">Workspaces</div>
        <div class="workspaces">
          <div class="ws active"><div class="ws-dot"></div><span>Frontend-Core</span></div>
          <div class="ws"><div class="ws-dot"></div><span>Backend-Auth</span></div>
          <div class="ws"><div class="ws-dot"></div><span>Database-Ops</span></div>
        </div>
      </aside>

      <main class="center-wrapper">
        <div class="view-flipper" id="viewFlipper">
          <div class="view-face view-terminal">
            <div class="tabs"><div class="tab">bash</div></div>
            <div class="term-content">
              <div><span class="ps">~</span> systemctl start janus-engine</div>
              <div style="color:#666; margin: 8px 0;">[ OK ] 神性聚变协议已加载</div>
              <div><span class="ps">~</span> <span class="caret"></span></div>
            </div>
          </div>
          <div class="view-face view-blueprint">
             <div class="blueprint-msg">
               <div class="blueprint-icon"><div style="width:20px;height:20px;background:var(--janus-orange);transform:rotate(45deg);"></div></div>
               <span>Blueprint Matrix Active</span>
             </div>
          </div>
        </div>
      </main>
      <aside class="panel"><div class="panel-header">Properties</div></aside>
      <footer class="status">
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--janus-current);box-shadow:0 0 6px var(--janus-current-glow); transition: background 0.4s, box-shadow 0.4s;"></div>
          <span>JanusX Online</span>
        </div>
      </footer>
    </div>
  </div>

  <script>
    const island = document.getElementById('janusIsland');
    const eyeMiniContainer = document.getElementById('janusEyeMini');
    const eyeMiniLeft = document.getElementById('eyeMiniLeft');
    const eyeMiniRight = document.getElementById('eyeMiniRight');
    
    const eyeLg = document.getElementById('janusFaceLg');
    const halo = document.getElementById('haloContainer');
    const flipper = document.getElementById('viewFlipper');
    const pullHint = document.getElementById('pullHint');
    const root = document.documentElement;

    let isPointerDown = false;
    let isDragging = false;
    let startY = 0, startX = 0;
    
    let pressDelayTimer = null;
    let longPressFrame = null;
    let pressStartTime = 0;
    
    const PRESS_DELAY = 100; 
    const LONG_PRESS_DURATION = 550; // 适当加快，让干脆感更强
    let hasTriggeredLongPress = false;
    
    // 全局状态
    let isBlueprintMode = false;
    let isRunning = false;

    // --- Pointer Down ---
    island.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      isPointerDown = true;
      isDragging = false;
      hasTriggeredLongPress = false;
      startY = e.clientY; startX = e.clientX;
      
      island.setPointerCapture(e.pointerId);
      island.classList.add('pressing');
      
      pressDelayTimer = setTimeout(() => {
        if (!isDragging) startLongPressProgress();
      }, PRESS_DELAY);
    });

    // --- Pointer Move ---
    island.addEventListener('pointermove', (e) => {
      if (!isPointerDown) return;
      
      let deltaY = e.clientY - startY;
      let deltaX = e.clientX - startX;
      
      if (!isDragging && Math.abs(deltaY) > 5 && Math.abs(deltaY) > Math.abs(deltaX)) {
        isDragging = true;
        clearTimeout(pressDelayTimer);
        cancelLongPressProgress();
        island.classList.remove('pressing');
      }

      if (isDragging && deltaY > 0) {
        island.style.transform = `translateY(${deltaY * 0.4}px)`;
        let baseRot = isBlueprintMode ? -180 : 0;
        flipper.style.transform = `rotateX(${baseRot + Math.min((deltaY/60)*-15, 0)}deg)`;
        
        if (deltaY > 20) {
          pullHint.classList.add('show');
          if (deltaY >= 60) {
            pullHint.textContent = '松开立即翻转';
            pullHint.style.color = '#fff';
            pullHint.style.borderColor = 'rgba(255,255,255,0.4)';
          } else {
            pullHint.textContent = '↓ 继续下拉切换视图';
            pullHint.style.color = '#888';
            pullHint.style.borderColor = 'rgba(255,255,255,0.1)';
          }
        }
      }
    });

    // --- Pointer Up / Cancel ---
    function handlePointerUp(e) {
      if (!isPointerDown) return;
      isPointerDown = false;
      island.releasePointerCapture(e.pointerId);
      island.classList.remove('pressing');
      clearTimeout(pressDelayTimer);
      
      if (isDragging) {
        island.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        island.style.transform = 'translateY(0)';
        pullHint.classList.remove('show');

        let deltaY = e.clientY - startY;
        if (deltaY >= 60) toggleBlueprintMode();
        else flipper.style.transform = isBlueprintMode ? 'rotateX(-180deg)' : 'rotateX(0deg)';
      } else {
        if (!hasTriggeredLongPress) cancelLongPressProgress();
      }
    }
    island.addEventListener('pointerup', handlePointerUp);
    island.addEventListener('pointercancel', handlePointerUp);

    // ================= 全新：无色极简形变长按 (Focus & Snap) =================
    function startLongPressProgress() {
      pressStartTime = Date.now();
      
      // 暂停 CSS 的缓动和待机动画，让 JS 逐帧接管物理变形
      island.style.transition = 'none';
      eyeMiniContainer.classList.add('is-charging');
      
      function tick() {
        let progress = Math.min((Date.now() - pressStartTime) / LONG_PRESS_DURATION, 1);
        
        // 1. 物理压缩 (取消所有颜色光晕)
        // 从 initial (1) 渐渐缩压到横向较细、纵向较扁的状态
        let scaleX = 1 - (progress * 0.08);
        let scaleY = 1 - (progress * 0.12);
        island.style.transform = `scale(${scaleX}, ${scaleY})`;

        // 2. 视线聚焦 (双眼受压向中间靠拢)
        // gap 为 5px，单边移动 2.5px 即可完美重合
        let eyeMove = progress * 2.5;
        eyeMiniLeft.style.transform = `translateX(${eyeMove}px)`;
        eyeMiniRight.style.transform = `translateX(${-eyeMove}px)`;
        
        if (progress >= 1) {
          hasTriggeredLongPress = true;
          toggleRunningState();
          cancelLongPressProgress(true); 
        } else {
          longPressFrame = requestAnimationFrame(tick);
        }
      }
      longPressFrame = requestAnimationFrame(tick);
    }

    function cancelLongPressProgress(completed = false) {
      cancelAnimationFrame(longPressFrame);
      
      // 归还 CSS 控制权，恢复生命力待机动画
      island.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
      eyeMiniContainer.classList.remove('is-charging');
      
      // 清空 JS 注入的空间位移
      eyeMiniLeft.style.transform = '';
      eyeMiniRight.style.transform = '';
      
      if (!completed) {
        island.style.transform = ''; 
      }
    }

    // ================= 临界释放与启停 =================
    function toggleRunningState() {
      const isStarting = !isRunning; 
      
      // 触发纯白色极简涟漪 (无色污染)
      const burstRing = document.getElementById('burstRing');
      burstRing.classList.remove('burst');
      void burstRing.offsetWidth; 
      burstRing.classList.add('burst');

      // 清除压迫形变，播放一个干脆的放大回弹 (Snap)
      island.style.transform = ''; 
      island.classList.add('trigger-snap');
      setTimeout(() => island.classList.remove('trigger-snap'), 500);
      
      isRunning = isStarting;
      updateStatusText();
      
      if (isRunning) {
        document.body.classList.add('is-running');
      } else {
        document.body.classList.remove('is-running');
      }
    }

    // ================= 核心：视图与模式硬绑定 =================
    function toggleBlueprintMode() {
      isBlueprintMode = !isBlueprintMode;
      flipper.style.transform = isBlueprintMode ? 'rotateX(-180deg)' : 'rotateX(0deg)';
      setJanusMode(isBlueprintMode ? 'analysis' : 'management');
    }

    function setJanusMode(mode) {
      eyeMiniContainer.className = `janus-face-mini mode-${mode}`;
      eyeLg.className = `janus-face-lg mode-${mode}`;
      halo.className = `divine-halo-container ${mode === 'analysis' ? 'mode-analysis-halo' : ''}`;

      if (mode === 'management') {
        root.style.setProperty('--janus-current', 'var(--janus-cyan)');
        root.style.setProperty('--janus-current-glow', 'var(--janus-cyan-glow)');
        document.getElementById('islandModeLabel').innerText = 'MODE: ORDER';
      } else {
        root.style.setProperty('--janus-current', 'var(--janus-orange)');
        root.style.setProperty('--janus-current-glow', 'var(--janus-orange-glow)');
        document.getElementById('islandModeLabel').innerText = 'MODE: ANALYTICS';
      }
      updateStatusText();
    }

    function updateStatusText() {
      const statusEl = document.getElementById('janusStatus');
      if (isRunning) {
        statusEl.innerText = 'DIVINE REACTOR // OVERLOAD';
      } else {
        statusEl.innerText = !isBlueprintMode ? 'ORDER // IDLE' : 'ANALYTICS // PROCESSING';
      }
    }

    // ================= 双击展开大面板 =================
    let islandExpanded = false;
    island.addEventListener('dblclick', (e) => {
      if (hasTriggeredLongPress) return;
      if (islandExpanded) collapseIsland(); else expandIsland();
    });

    document.getElementById('janusBackdropBg').addEventListener('click', collapseIsland);
    document.getElementById('janusExpanded').addEventListener('dblclick', collapseIsland);

    function expandIsland() {
      islandExpanded = true;
      document.getElementById('janusBackdrop').classList.add('visible');
    }
    function collapseIsland() {
      islandExpanded = false;
      document.getElementById('janusBackdrop').classList.remove('visible');
    }

    // ================= 工作区切换微缩动画 =================
    document.querySelectorAll('.ws').forEach(wsEl => {
      wsEl.addEventListener('click', () => {
        document.querySelectorAll('.ws').forEach(w => w.classList.remove('active'));
        wsEl.classList.add('active');
        
        island.classList.add('switching');
        eyeMiniContainer.style.opacity = '0';
        eyeMiniContainer.style.transform = 'scale(0.3)';
        
        setTimeout(() => {
          eyeMiniContainer.style.opacity = '1';
          eyeMiniContainer.style.transform = 'scale(1)';
          island.classList.remove('switching');
        }, 300);
      });
    });
  </script>
</body>
</html>
