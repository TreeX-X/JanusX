<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwitchX Mascot - LED ByteCat Edition</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #141417;
            --surface-code: #070709;
            --border: #27272a;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
            
            /* LED 屏幕主题色（提取自你的胖橘色） */
            --led-primary: #ff7830;
            --led-glow: rgba(255, 120, 48, 0.6);
            --led-dim: rgba(255, 120, 48, 0.1);
            
            --pixel-size: 8px; /* 调整网格大小，完美适配 32x32 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Courier New', Courier, monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-size: 1.5rem; color: #fff; }
        header h1 span { color: var(--led-primary); text-shadow: 0 0 10px var(--led-glow); }
        header p { font-size: 0.8rem; color: var(--text-dim); margin-top: 6px; }

        .workspace {
            display: grid;
            grid-template-columns: auto 380px;
            gap: 24px;
            max-width: 920px;
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }

        @media (max-width: 768px) { .workspace { grid-template-columns: 1fr; } }

        /* ================= 核心：LED 监视器 ================= */
        .visualizer {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #111;
            border: 2px solid #333;
            border-radius: 16px;
            padding: 20px;
            box-shadow: inset 0 0 20px #000, 0 10px 30px rgba(0,0,0,0.5);
        }

        .screen-bezel {
            position: relative;
            background: #020202;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 0 30px #000;
        }

        .canvas-container {
            position: relative;
            width: 256px;
            height: 256px;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 纯净的 HTML Canvas */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* 视觉欺骗：CSS 像素网格遮罩 */
        .pixel-overlay {
            position: absolute;
            inset: 0;
            background-image: 
                repeating-linear-gradient(transparent, transparent calc(var(--pixel-size) - 1px), #020202 calc(var(--pixel-size) - 1px), #020202 var(--pixel-size)),
                repeating-linear-gradient(90deg, transparent, transparent calc(var(--pixel-size) - 1px), #020202 calc(var(--pixel-size) - 1px), #020202 var(--pixel-size));
            background-size: 100% 100%;
            pointer-events: none;
        }

        /* 屏幕扫描线 */
        .scanline {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.4) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.5;
            animation: scan 6s linear infinite;
        }

        @keyframes scan { 100% { background-position: 0 100vh; } }

        /* ================= 交互控制台 ================= */
        .controls { display: flex; flex-direction: column; justify-content: space-between; gap: 15px; }
        
        .state-title { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }

        .btn-state {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: inherit;
        }

        .btn-state:hover { border-color: rgba(255, 120, 48, 0.4); color: #fff; }

        .btn-state.active {
            border-color: var(--led-primary);
            color: var(--led-primary);
            background: var(--led-dim);
            box-shadow: inset 0 0 10px rgba(255,120,48,0.2);
            text-shadow: 0 0 5px var(--led-primary);
        }

        /* 日志终端 */
        .terminal {
            background: var(--surface-code);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            font-size: 0.7rem;
            height: 140px;
            overflow-y: auto;
            color: #d4d4d8;
        }
        .log-line { margin-bottom: 4px; line-height: 1.4; }
        .log-time { color: #555; margin-right: 6px; }
        .log-tag { color: var(--led-primary); margin-right: 6px; }
    </style>
</head>
<body>

<header>
    <h1>SwitchX Mascot <span>[ LED-ByteCat ]</span></h1>
    <p>桌面级核心伴随智能体 · 像素矩阵版</p>
</header>

<div class="workspace">
    <!-- 左侧展示区：数码显示屏 -->
    <div class="visualizer">
        <div class="screen-bezel">
            <div class="canvas-container">
                <!-- 依然是 32x32 的底层逻辑 -->
                <canvas id="petCanvas" width="32" height="32"></canvas>
                <!-- 叠加像素网格与扫描线，制造 LED 质感 -->
                <div class="pixel-overlay"></div>
                <div class="scanline"></div>
            </div>
        </div>
    </div>

    <!-- 右侧控制区 -->
    <div class="controls">
        <div class="state-title">Agent 行为矩阵</div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
            <button class="btn-state active" data-state="idle">
                <span>[0] IDLE - 待命呼吸</span>
            </button>
            <button class="btn-state" data-state="reading">
                <span>[1] READING - 扫描检索</span>
            </button>
            <button class="btn-state" data-state="writing">
                <span>[2] WRITING - 高速运算</span>
            </button>
            <button class="btn-state" data-state="success">
                <span>[3] SUCCESS - 任务完成</span>
            </button>
            <button class="btn-state" data-state="error">
                <span>[4] ERROR - 异常报警</span>
            </button>
        </div>

        <div>
            <div class="state-title" style="margin-bottom: 8px;">System.Log</div>
            <div class="terminal" id="terminalLog">
                <div class="log-line"><span class="log-time">[Init]</span><span class="log-tag">[Core]</span> LED 矩阵初始化完成...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('petCanvas');
    const ctx = canvas.getContext('2d');
    const terminalLog = document.getElementById('terminalLog');

    let currentStatus = 'idle';
    let tick = 0;

    // 获取 CSS 变量中的颜色，用于 Canvas 绘图
    const rootStyles = getComputedStyle(document.documentElement);
    const colorOn = rootStyles.getPropertyValue('--led-primary').trim();
    // 关灯状态的暗色，增加细节层次
    const colorDim = 'rgba(255, 120, 48, 0.15)'; 
    const colorOff = 'transparent';

    const stateLogs = {
        idle: "状态切换: IDLE. 核心待命，平稳呼吸中...",
        reading: "状态切换: READING. 光学探测器启动，正在扫描代码库...",
        writing: "状态切换: WRITING. 算力拉满，脑波矩阵高频闪烁中...",
        success: "状态切换: SUCCESS！编译通过，释放开心荷尔蒙！",
        error: "状态切换: ERROR. 核心报错！系统发生不可逆的紊乱故障！"
    };

    // UI 按钮绑定
    document.querySelectorAll('.btn-state').forEach(button => {
        button.addEventListener('click', () => {
            document.querySelectorAll('.btn-state').forEach(b => b.classList.remove('active'));
            button.classList.add('active');
            currentStatus = button.getAttribute('data-state');
            tick = 0; // 切换状态时重置时间轴
            addLog(stateLogs[currentStatus]);
        });
    });

    function addLog(text) {
        const time = new Date().toTimeString().split(' ')[0];
        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = `<span class="log-time">[${time}]</span><span class="log-tag">[Sys]</span> ${text}`;
        terminalLog.appendChild(line);
        terminalLog.scrollTop = terminalLog.scrollHeight;
    }

    // --- 绘图工具箱 ---
    function drawPixel(x, y, color = colorOn) {
        if(x >= 0 && x < 32 && y >= 0 && y < 32) {
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);
        }
    }

    function drawRect(x, y, w, h, color = colorOn) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
    }

    // --- 核心绘图引擎：专注绘制 LED 猫咪表情 ---
    function drawLEDMascot() {
        // 清除画布并填充极微弱的底色
        ctx.clearRect(0, 0, 32, 32);

        // 为了配合 LED 效果，增加一些屏幕呼吸感
        let breath = (currentStatus === 'idle') ? Math.sin(tick * 0.05) * 1 : 0;
        let yBase = 12 + Math.floor(breath); // 面部基础 Y 坐标
        let xBase = 0; // 基础 X 坐标

        // 全局故障抖动 (Error 专用)
        if (currentStatus === 'error') {
            xBase = (Math.random() > 0.5) ? 1 : -1;
            yBase += (Math.random() > 0.5) ? 1 : -1;
        }

        // ================= 各状态表情逻辑 =================
        
        if (currentStatus === 'idle') {
            // 平静的大眼睛
            let isBlinking = (tick % 100 > 90); // 偶尔眨眼
            
            if (!isBlinking) {
                drawRect(6, yBase, 6, 8); // 左眼
                drawRect(20, yBase, 6, 8); // 右眼
            } else {
                drawRect(6, yBase + 3, 6, 2); // 闭眼
                drawRect(20, yBase + 3, 6, 2);
            }

            // 猫咪可爱的 'w' 嘴巴
            drawPixel(12, yBase + 7); drawPixel(13, yBase + 8); drawPixel(14, yBase + 7);
            drawPixel(15, yBase + 8);
            drawPixel(17, yBase + 8);
            drawPixel(18, yBase + 7); drawPixel(19, yBase + 8); drawPixel(20, yBase + 7); // 这里用点拼凑
            // 修正嘴巴的绘制更像一个小小的 w
            drawRect(14, yBase+6, 1, 2); drawRect(15, yBase+7, 1, 1); drawRect(16, yBase+6, 1, 2);
            drawRect(17, yBase+7, 1, 1); drawRect(18, yBase+6, 1, 2);
        }
        
        else if (currentStatus === 'reading') {
            // 扫描模式：戴上方框眼镜，眼球左右扫描
            
            // 眼镜框 (较暗的灯光)
            drawRect(4, yBase - 2, 10, 10, colorDim); // 左框
            drawRect(5, yBase - 1, 8, 8, colorOff); // 掏空
            drawRect(18, yBase - 2, 10, 10, colorDim); // 右框
            drawRect(19, yBase - 1, 8, 8, colorOff); // 掏空
            drawRect(14, yBase + 2, 4, 2, colorDim); // 鼻梁架
            
            // 扫描的眼珠
            let scan = Math.sin(tick * 0.1) * 2; // -2 到 2 之间移动
            let eyeX = 7 + Math.floor(scan);
            
            drawRect(eyeX, yBase, 4, 6);
            drawRect(eyeX + 14, yBase, 4, 6);
            
            // 嘴巴变成一条线，表示专注
            drawRect(14, yBase + 8, 4, 1);
        }
        
        else if (currentStatus === 'writing') {
            // 高速运算：专注且眉头紧锁，屏幕下方有敲击代码的痕迹
            
            // 倾斜的专注眼睛
            // 左眼 \
            drawRect(5, yBase, 2, 2); drawRect(7, yBase+2, 2, 2); drawRect(9, yBase+4, 2, 2);
            drawRect(6, yBase, 4, 6); // 眼球主体
            // 右眼 /
            drawRect(25, yBase, 2, 2); drawRect(23, yBase+2, 2, 2); drawRect(21, yBase+4, 2, 2);
            drawRect(22, yBase, 4, 6);
            
            // 紧咬的小嘴巴
            drawRect(15, yBase+7, 2, 2);
            
            // 模拟下方的代码流 (矩阵运算)
            if (tick % 5 === 0) {
                for(let i=0; i<32; i+=4) {
                    if(Math.random() > 0.5) drawRect(i, 28 + Math.random()*4, 2, 1);
                }
            }
        }
        
        else if (currentStatus === 'success') {
            // 开心：^ ^ 眼睛，旁边冒出小爱心或星星
            
            // 左眼 ^
            drawRect(6, yBase+3, 2, 3);
            drawRect(8, yBase+1, 2, 2);
            drawRect(10, yBase+3, 2, 3);
            
            // 右眼 ^
            drawRect(20, yBase+3, 2, 3);
            drawRect(22, yBase+1, 2, 2);
            drawRect(24, yBase+3, 2, 3);
            
            // 大大的张嘴笑 :D
            drawRect(14, yBase+5, 4, 1);
            drawRect(13, yBase+6, 1, 3);
            drawRect(18, yBase+6, 1, 3);
            drawRect(14, yBase+9, 4, 1);
            // 舌头
            drawRect(15, yBase+7, 2, 2, colorDim);
            
            // 升起开心的泡泡/星星
            let particleY = 32 - (tick % 32);
            drawRect(2, particleY, 2, 2);
            drawRect(28, (particleY + 10) % 32, 2, 2);
        }
        
        else if (currentStatus === 'error') {
            // 报错：> < 眼睛，带点电流乱码感
            
            // 左眼 >
            drawRect(6, yBase+xBase, 2, 2); drawRect(8, yBase+2+xBase, 2, 2); drawRect(6, yBase+4+xBase, 2, 2);
            
            // 右眼 <
            drawRect(24, yBase+xBase, 2, 2); drawRect(22, yBase+2+xBase, 2, 2); drawRect(24, yBase+4+xBase, 2, 2);
            
            // 委屈曲折的嘴巴
            drawRect(13, yBase+7, 2, 1); drawRect(15, yBase+8, 2, 1); drawRect(17, yBase+7, 2, 1);
            
            // 随机的乱码条纹 (模拟系统崩溃屏幕闪烁)
            if(Math.random() > 0.7) {
                let glitchY = Math.floor(Math.random() * 32);
                drawRect(0, glitchY, 32, 1, colorDim);
                drawRect(Math.random()*20, glitchY, 10, 1);
            }
        }
    }

    // --- 动画循环 ---
    function animationLoop() {
        tick++;
        drawLEDMascot();
        
        // 增加额外的屏幕发光渲染（使纯净 Canvas 的像素点带有一点发散的光晕）
        // 因为我们有 CSS pixel-overlay 遮罩，所以这里的发光会在网格底层渲染，效果非常好。
        ctx.shadowBlur = 4;
        ctx.shadowColor = colorOn;
        
        requestAnimationFrame(animationLoop);
    }

    // 启动
    addLog("ByteCat 智控中心启动完毕。等待指令...");
    animationLoop();
</script>

</body>
</html>
