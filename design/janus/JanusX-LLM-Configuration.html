<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JanusX · LLM Configuration</title>
  <style>
    /* ================= 基础与系统变量 ================= */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #000;
      --surface: rgba(18, 18, 18, 0.95);
      --border: rgba(255, 255, 255, 0.08);
      --text: #d4d4d4;
      
      /* Janus 神性色彩系统 */
      --janus-cyan: #00f0ff;
      --janus-cyan-glow: rgba(0, 240, 255, 0.4);
      --janus-green: #00ff88;
      
      --janus-current: var(--janus-cyan);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden; height: 100vh; padding: 12px;
    }

    .window {
      height: 100%; background: var(--surface);
      backdrop-filter: blur(40px) saturate(160%); border-radius: 12px;
      overflow: hidden; box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6), 0 0 0 0.5px var(--border);
      display: flex; flex-direction: column; position: relative;
    }

    /* ── 标题栏与优雅的隐藏触发器 ── */
    .titlebar {
      height: 38px; background: rgba(12, 12, 12, 0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06); display: flex; align-items: center;
      padding: 0 14px; position: relative; z-index: 1001; -webkit-app-region: drag;
    }
    .traffic-lights { display: flex; gap: 8px; -webkit-app-region: no-drag; z-index: 10; }
    .light { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; transition: filter 0.15s; }
    .light.red { background: #ff5f57; } .light.yellow { background: #ffbd2e; } .light.green { background: #28c840; }
    
    /* 核心优化：极简、渐进式的交互触发区域 */
    .title-trigger { 
      position: absolute; left: 70px; display: flex; align-items: center; gap: 8px; 
      -webkit-app-region: no-drag; user-select: none; cursor: pointer; 
      padding: 4px; border-radius: 6px; transition: all 0.4s ease;
    }

    /* 图标部分：平时的 X 态 */
    .title-icon { width: 16px; height: 16px; position: relative; }
    .title-icon::before, .title-icon::after { 
      content: ''; position: absolute; width: 14px; height: 1.5px; 
      top: 50%; left: 50%; border-radius: 1px; 
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }
    .title-icon::before { background: #888; transform: translate(-50%, -50%) rotate(45deg); } 
    .title-icon::after { background: var(--janus-current); transform: translate(-50%, -50%) rotate(-45deg); }

    /* 文字部分 */
    .title-text { 
      font-size: 13px; font-weight: 500; color: #888; letter-spacing: 0.5px;
      transition: color 0.4s, text-shadow 0.4s; 
    }

    /* 隐藏的后缀代码（悬浮时滑出） */
    .title-reveal {
      font-family: 'SF Mono', monospace; font-size: 9px; font-weight: 600;
      color: var(--janus-current); letter-spacing: 1px; opacity: 0;
      transform: translateX(-8px) scale(0.9);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      pointer-events: none;
    }

    /* === 悬停时的神性形变 === */
    /* 1. 两条线旋转变为平行的配置通道 */
    .title-trigger:hover .title-icon::before { background: #fff; transform: translate(-50%, -4px) rotate(0deg); box-shadow: 0 0 6px rgba(255,255,255,0.4); }
    .title-trigger:hover .title-icon::after { transform: translate(-50%, 3px) rotate(0deg); box-shadow: 0 0 8px var(--janus-current-glow); }
    
    /* 2. 标题文字点亮并散发微光 */
    .title-trigger:hover .title-text { color: #fff; text-shadow: 0 0 10px var(--janus-current-glow); }
    
    /* 3. 隐藏代码浮现 */
    .title-trigger:hover .title-reveal { opacity: 0.9; transform: translateX(0) scale(1); }


    /* ================= 主布局 Grid ================= */
    .main { flex: 1; display: grid; grid-template-areas: "sidebar terminal panel" "status status status"; grid-template-columns: 240px 1fr 280px; grid-template-rows: 1fr 26px; overflow: hidden; }

    .sidebar { grid-area: sidebar; background: rgba(26, 26, 26, 0.85); border-right: 1px solid rgba(255, 255, 255, 0.06); display: flex; flex-direction: column; z-index: 10; }
    .sidebar-header, .panel-header { padding: 12px 14px; border-bottom: 1px solid rgba(255, 255, 255, 0.06); font-size: 10px; font-weight: 600; text-transform: uppercase; color: #555; }
    .workspaces { flex: 1; padding: 6px; overflow-y: auto; }
    .ws { padding: 9px 12px; margin-bottom: 1px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #999; transition: background 0.2s; }
    .ws.active { background: rgba(255, 255, 255, 0.08); color: #fff; border-left: 2px solid var(--janus-current); }

    .center-wrapper { grid-area: terminal; position: relative; background: #000; overflow: hidden; display: flex; flex-direction: column;}
    .tabs { display: flex; background: rgba(6, 6, 6, 0.95); border-bottom: 1px solid rgba(255, 255, 255, 0.06); padding: 0 10px; gap: 1px; }
    .tab { padding: 8px 14px; font-size: 12px; color: #aaa; background: rgba(12, 12, 12, 0.95); border-bottom: 1px solid var(--janus-current); border-radius: 5px 5px 0 0; margin-top: 3px; font-family: 'SF Mono', monospace; }
    .term-content { flex: 1; padding: 14px 16px; font-family: 'SF Mono', monospace; font-size: 13px; line-height: 1.6; overflow-y: auto; color:#d4d4d4;}
    .ps { color: var(--janus-current); margin-right: 8px; }
    .caret { display: inline-block; width: 7px; height: 15px; background: var(--janus-current); animation: blink 1.1s infinite; margin-left: 2px; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    .panel { grid-area: panel; background: rgba(26, 26, 26, 0.85); border-left: 1px solid rgba(255, 255, 255, 0.06); }
    .status { grid-area: status; background: rgba(8, 8, 8, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.08); display: flex; align-items: center; padding: 0 14px; font-size: 10px; color: #555; z-index: 10; font-family: 'SF Mono', monospace; letter-spacing: 1px;}
    
    /* ================= 极简 LLM 配置模态框 ================= */
    .modal-backdrop {
      position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .modal-backdrop.show { opacity: 1; pointer-events: auto; }

    .llm-config-panel {
      width: 480px; background: #111; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      transform: translateY(20px) scale(0.98); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-backdrop.show .llm-config-panel { transform: translateY(0) scale(1); }

    .config-header {
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; justify-content: space-between; align-items: center;
    }
    .config-title { font-size: 13px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 8px; letter-spacing: 0.5px;}
    .config-title i { width: 8px; height: 8px; background: var(--janus-current); border-radius: 50%; box-shadow: 0 0 8px var(--janus-current-glow); }
    .close-btn { color: #666; cursor: pointer; font-size: 18px; line-height: 1; transition: color 0.2s; }
    .close-btn:hover { color: #fff; }

    .config-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; max-height: 60vh; overflow-y: auto; }
    
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 11px; color: #888; font-family: 'SF Mono', monospace; text-transform: uppercase; }
    
    /* 极简输入框样式 */
    .config-input {
      background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 12px; border-radius: 6px; color: #fff; font-size: 13px;
      font-family: inherit; outline: none; transition: all 0.3s;
    }
    .config-input:focus {
      background: rgba(255, 255, 255, 0.06); border-color: var(--janus-current);
      box-shadow: 0 0 0 1px var(--janus-current-glow);
    }
    textarea.config-input { resize: vertical; min-height: 80px; font-family: 'SF Mono', monospace; font-size: 12px; line-height: 1.5; }
    select.config-input { appearance: none; cursor: pointer; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 10px center; background-size: 14px; }

    /* 滑块样式 */
    .range-wrapper { display: flex; align-items: center; gap: 12px; }
    .range-val { font-family: 'SF Mono', monospace; font-size: 12px; color: var(--janus-current); width: 30px;}
    input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%; background: var(--janus-current); margin-top: -5px; cursor: pointer; box-shadow: 0 0 10px var(--janus-current-glow); transition: transform 0.1s; }
    input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

    .config-footer {
      padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.3); display: flex; justify-content: space-between; align-items: center;
    }
    
    .btn {
      padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; border: none; font-family: inherit;
    }
    .btn-ghost { background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.1); }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: #fff; }
    
    .btn-primary { background: #fff; color: #000; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(255,255,255,0.4); }
    
    .test-status { font-size: 11px; font-family: 'SF Mono', monospace; opacity: 0; transition: opacity 0.3s; }
    .test-status.testing { color: #aaa; opacity: 1; }
    .test-status.success { color: var(--janus-green); opacity: 1; }
  </style>
</head>
<body>
  <div class="window">
    <div class="titlebar">
      <div class="traffic-lights">
        <div class="light red"></div><div class="light yellow"></div><div class="light green"></div>
      </div>
      
      <!-- 重新设计的隐藏触发器 -->
      <div class="title-trigger" id="secretTrigger">
        <div class="title-icon"></div>
        <span class="title-text">JanusX</span>
        <!-- 悬浮时解密滑出的文本 -->
        <span class="title-reveal">:: LLM_CFG</span>
      </div>
    </div>
    
    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">Workspaces</div>
        <div class="workspaces">
          <div class="ws active"><span>Frontend-Core</span></div>
          <div class="ws"><span>Backend-Auth</span></div>
        </div>
      </aside>

      <main class="center-wrapper">
        <div class="tabs"><div class="tab">bash</div></div>
        <div class="term-content">
          <div><span class="ps">~</span> systemctl status divine-protocol</div>
          <div style="color:#666; margin: 8px 0;">[ OK ] Core systems online. Awaiting neural link.</div>
          <div style="color:#888; margin-bottom: 8px;">// Tip: Hover & Click the JanusX logo on the top left.</div>
          <div><span class="ps">~</span> <span class="caret"></span></div>
        </div>
      </main>

      <aside class="panel"><div class="panel-header">Properties</div></aside>
      
      <footer class="status">
        <div style="display:flex; align-items:center; gap:6px;">
          <div style="width:5px;height:5px;border-radius:50%;background:var(--janus-current);box-shadow:0 0 6px var(--janus-current-glow);"></div>
          <span>SYSTEM IDLE</span>
        </div>
      </footer>
    </div>

    <!-- LLM 配置模态框 -->
    <div class="modal-backdrop" id="llmModal">
      <div class="llm-config-panel">
        <div class="config-header">
          <div class="config-title"><i></i> LLM Engine Settings</div>
          <div class="close-btn" id="closeModal">&times;</div>
        </div>
        
        <div class="config-body">
          <div class="form-group">
            <label>Model Provider</label>
            <select class="config-input">
              <option value="openai">OpenAI (GPT-4 Turbo)</option>
              <option value="anthropic">Anthropic (Claude 3 Opus)</option>
              <option value="custom">Custom Local Node</option>
            </select>
          </div>

          <div class="form-group">
            <label>Base URL</label>
            <input type="text" class="config-input" placeholder="https://api.openai.com/v1" value="https://api.openai.com/v1">
          </div>

          <div class="form-group">
            <label>API Key</label>
            <input type="password" class="config-input" placeholder="sk-..." value="sk-xxxxxxxxxxxxxxxxxxxx">
          </div>

          <div class="form-group">
            <label>Temperature (<span id="tempValue">0.7</span>)</label>
            <div class="range-wrapper">
              <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7">
              <span class="range-val">0.7</span>
            </div>
          </div>

          <div class="form-group">
            <label>System Prompt Override</label>
            <textarea class="config-input" placeholder="You are JanusX, an omniscient system...">You are JanusX, a divine-level coding assistant. Respond with maximum efficiency.</textarea>
          </div>
        </div>

        <div class="config-footer">
          <div class="test-status" id="testStatus">Connecting...</div>
          <div style="display: flex; gap: 10px;">
            <button class="btn btn-ghost" id="btnTest">Ping Network</button>
            <button class="btn btn-primary" id="btnSave">Save & Apply</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- 优雅的隐藏唤醒逻辑 ---
    const secretTrigger = document.getElementById('secretTrigger');
    const llmModal = document.getElementById('llmModal');
    const closeModalBtn = document.getElementById('closeModal');

    // 由于加入了优秀的视觉暗示，单点即可触发，不再需要双击防误触
    secretTrigger.addEventListener('click', () => {
      llmModal.classList.add('show');
    });

    // 关闭逻辑
    closeModalBtn.addEventListener('click', () => {
      llmModal.classList.remove('show');
      resetTestStatus();
    });

    llmModal.addEventListener('click', (e) => {
      if (e.target === llmModal) {
        llmModal.classList.remove('show');
        resetTestStatus();
      }
    });

    // --- 表单交互逻辑 ---
    const tempSlider = document.getElementById('tempSlider');
    const tempLabels = document.querySelectorAll('.range-val, #tempValue');
    
    tempSlider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value).toFixed(1);
      tempLabels.forEach(el => el.innerText = val);
    });

    const btnTest = document.getElementById('btnTest');
    const testStatus = document.getElementById('testStatus');

    btnTest.addEventListener('click', () => {
      testStatus.className = 'test-status testing';
      testStatus.innerText = 'Pinging API node...';
      
      setTimeout(() => {
        testStatus.className = 'test-status success';
        testStatus.innerText = 'Connection Established [24ms]';
      }, 800);
    });

    const btnSave = document.getElementById('btnSave');
    btnSave.addEventListener('click', () => {
      llmModal.classList.remove('show');
      
      const termContent = document.querySelector('.term-content');
      const caret = document.querySelector('.caret');
      
      const newLog = document.createElement('div');
      newLog.innerHTML = `<span style="color: var(--janus-current)">[SYSTEM]</span> Neural link parameters applied :: Ready.`;
      
      termContent.insertBefore(newLog, caret.parentElement);
      resetTestStatus();
    });

    function resetTestStatus() {
      setTimeout(() => {
        testStatus.className = 'test-status';
        testStatus.innerText = 'Connecting...';
      }, 300);
    }
  </script>
</body>
</html>
